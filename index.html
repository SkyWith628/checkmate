    .fullscreen-menu.active .menu-list li:nth-child(3) a { transition-delay: 0.2s; }
    .fullscreen-menu.active .menu-list li:nth-child(4) a { transition-delay: 0.25s; }
    .fullscreen-menu.active .menu-list li:nth-child(5) a { transition-delay: 0.3s; }

    .category-card:hover::after { background: rgba(28,26,23,0.08); }

    .products-title { font-family: var(--font-display); font-size: 42px; font-weight: 300; font-style: italic; }

    .view-all {

    .view-all:hover { color: var(--gold); border-color: var(--gold); }

    .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .product-card { cursor: pointer; }

    .product-img {

      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-style: italic; font-size: 14px;
      color: var(--muted); transition: transform 0.4s; overflow: hidden;

    .product-card:hover .product-img { transform: scale(0.98); }

    .product-name { font-family: var(--font-display); font-size: 18px; font-weight: 300; margin-bottom: 4px; }
    .product-material { display: none; }
    .product-price { font-size: 14px; color: var(--gold); }

    footer { background: var(--dark); color: var(--sand); padding: 60px; display: flex; justify-content: space-between; align-items: center; }
    footer .logo { color: var(--sand); }
    .footer-text { font-size: 12px; color: var(--muted); letter-spacing: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-text > * { opacity: 0; animation: fadeUp 0.8s ease forwards; }
    .hero-eyebrow  { animation-delay: 0.1s; }
    .hero-title    { animation-delay: 0.3s; }
    .hero-desc     { animation-delay: 0.5s; }
    .btn-primary   { animation-delay: 0.7s; }

    @media (max-width: 768px) {
      html, body { overflow-x: hidden; max-width: 100vw; }
      nav { padding: 16px 20px; }
      .logo { font-size: 22px; letter-spacing: 4px; }
      .nav-links { display: none; }
      .nav-right { gap: 12px; }
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-text { padding: 48px 24px 32px; }
      .hero-title { font-size: 44px; }
      .hero-title span { font-size: 32px; }
      .hero-image { min-height: 360px; }
      .categories { padding: 40px 20px; }
      .category-grid { grid-template-columns: 1fr 1fr; }
      .category-card:first-child { grid-row: span 1; aspect-ratio: 3/4; }
      .products { padding: 40px 20px; }
      .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .products-header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 24px; }
      footer { padding: 24px 20px; flex-direction: column; gap: 8px; text-align: center; }
    }

  </style>

      if (user) {
        try {
          const banned = await getDoc(doc(db, 'banned_users', user.uid));
          if (banned.exists()) { await signOut(auth); return; }
        } catch { }

        let displayName = user.displayName || user.email;
        try {
          const uSnap = await getDoc(doc(db, 'users', user.uid));
          if (uSnap.exists()) {
            const d = uSnap.data();
            displayName = d.firstName || d.name || displayName;
          }
        } catch {}
        area.innerHTML = `
          <a class="nav-user-logged" href="mypage.html">
            <span class="nav-user-name">${displayName}&thinsp;님</span>
          </a>
        `;
      } else {
        area.innerHTML = `
          <a href="login.html" class="nav-icon-link">
            <img src="picture/KakaoTalk_20260519_112050420.png" width="22" height="22" alt="사용자" style="display:block;">
          </a>
        `;
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-wrap')) closeSearch();
    });

    const CAT_LABEL = { pendant: 'Pendant', ring: 'Ring', earring: 'Earring', bracelet: 'Bracelet' };
    let allProducts = null;

    async function ensureProducts() {
      if (allProducts !== null) return;
      try {
        const snap = await getDocs(collection(db, 'products'));
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        allProducts = [];
      }
    }

    function showResults(results) {
      const el = document.getElementById('search-results');
      if (results.length === 0) {
        el.innerHTML = `<p class="search-empty">검색 결과가 없습니다</p>`;
      } else {
        el.innerHTML = results.map(p => {
          const imgSrc = p.image || (p.images && p.images[0]);
          const imgHtml = imgSrc ? `<img src="${imgSrc}" alt="">` : (CAT_LABEL[p.category] || '✦');
          const price = p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '';
          const cat = CAT_LABEL[p.category] || '';
          const meta = [cat, p.material].filter(Boolean).join(' · ');
          return `<a class="search-result-item" href="product.html?id=${p.id}">
            <div class="sri-img">${imgHtml}</div>
            <div class="sri-info">
              <p class="sri-name">${p.name || '-'}</p>
              <p class="sri-meta">${meta}</p>
            </div>
            ${price ? `<span class="sri-price">${price}</span>` : ''}
          </a>`;
        }).join('');
      }
      el.classList.add('has-results');
    }

    function closeSearch() {
      const el = document.getElementById('search-results');
      if (el) { el.classList.remove('has-results'); el.innerHTML = ''; }
    }

    document.getElementById('search-input').addEventListener('input', async function () {
      const q = this.value.trim().toLowerCase();
      if (!q) { closeSearch(); return; }
      await ensureProducts();
      const results = allProducts.filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      ).slice(0, 6);
      showResults(results);
    });

    document.getElementById('search-input').addEventListener('keydown', async function (e) {
      if (e.key !== 'Enter') return;
      const q = this.value.trim().toLowerCase();
      if (!q) return;
      await ensureProducts();
      const first = allProducts.find(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      );
      if (first) location.href = `product.html?id=${first.id}`;
    });
  </script>

  <script>
    function clearSearchResults() {
      const el = document.getElementById('search-results');
      if (el) { el.classList.remove('has-results'); el.innerHTML = ''; }
    }
    function toggleSearch() {
      const wrap = document.getElementById('search-wrap');
      const isActive = wrap.classList.toggle('active');
      if (isActive) {
        setTimeout(() => document.getElementById('search-input').focus(), 50);
      } else {
        document.getElementById('search-input').value = '';
        clearSearchResults();
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('search-wrap').classList.remove('active');
        document.getElementById('search-input').value = '';
        clearSearchResults();
      }
    });

    const menu = document.getElementById('fullscreen-menu');
    const nav  = document.getElementById('nav');
    const bar1 = document.getElementById('bar1');
    const bar2 = document.getElementById('bar2');
    const bar3 = document.getElementById('bar3');
    const GOLD = '#C9A96E';
    const DARK = '#1C1A17';
    const DUR  = 700;
    let isOpen = false;
    let busy   = false;

    function animateBars(open) {
      if (open) {
        bar1.style.transition = `transform ${DUR}ms cubic-bezier(0.4,0,0.2,1), background ${DUR/2}ms ease`;
        bar2.style.transition = `opacity 150ms ease 80ms, background ${DUR/2}ms ease`;
        bar3.style.transition = `transform ${DUR}ms cubic-bezier(0.4,0,0.2,1), background ${DUR/2}ms ease`;
        bar1.style.background = GOLD;
        bar2.style.background = GOLD;
        bar3.style.background = GOLD;
        bar1.style.transform  = 'translateY(7px) rotate(580deg)';
        bar2.style.opacity    = '0';
        bar3.style.transform  = 'translateY(-7px) rotate(-430deg)';
      } else {
        bar1.style.transition = `transform ${DUR}ms cubic-bezier(0.4,0,0.2,1), background ${DUR/2}ms ease ${DUR/2}ms`;
        bar2.style.transition = `opacity 200ms ease ${DUR*0.55}ms, background ${DUR/2}ms ease ${DUR/2}ms`;
        bar3.style.transition = `transform ${DUR}ms cubic-bezier(0.4,0,0.2,1), background ${DUR/2}ms ease ${DUR/2}ms`;
        bar1.style.transform  = 'translateY(0px) rotate(0deg)';
        bar2.style.opacity    = '1';
        bar3.style.transform  = 'translateY(-0px) rotate(0deg)';
        setTimeout(() => {
          bar1.style.background = DARK;
          bar2.style.background = DARK;
          bar3.style.background = DARK;
        }, DUR / 2);
      }
    }

    function toggleMenu() {
      if (busy) return;
      busy   = true;
      isOpen = !isOpen;
      animateBars(isOpen);
      if (isOpen) {
        menu.classList.add('active');
        nav.classList.add('menu-open');
        document.body.style.overflow = 'hidden';
      } else {
        menu.classList.remove('active');
        nav.classList.remove('menu-open');
        document.body.style.overflow = '';
      }
      setTimeout(() => { busy = false; }, DUR + 100);
    }
  </script>

    let quizAnswers = {};

    function selectAnswer(id, value, nextIndex) {
      quizAnswers[id] = value;
      renderQuiz(nextIndex);
    }

    function renderQuiz(stepIndex) {
      const wrap = document.getElementById('quiz-wrap');

      if (stepIndex >= surveySteps.length) {
        const result = quizResults[quizAnswers.gender]?.[quizAnswers.style];
        if (!result) return;
        wrap.innerHTML = `
          <div class="quiz-card">
            <p class="quiz-result-label">Your Style ✦</p>
            <h2 class="quiz-result-title">${result.title}</h2>
            <p class="quiz-result-sub">${result.sub}</p>
            <div class="quiz-deco"></div>
            <p class="quiz-result-desc">${result.desc}</p>
            <button class="quiz-retry" onclick="quizAnswers={};renderQuiz(0)">다시 진단하기</button>
          </div>`;
        return;
      }

      const step = surveySteps[stepIndex];
      const options = step.optionsByGender
        ? (step.optionsByGender[quizAnswers.gender] || step.optionsByGender.female)
        : step.options;

      wrap.innerHTML = `
        <div class="quiz-card">
          <p class="quiz-step">${step.step}</p>
          <h2 class="quiz-q">${step.q}</h2>
          <div class="quiz-options">
            ${options.map(o => `<button class="quiz-btn" onclick="selectAnswer('${step.id}','${o.value}',${stepIndex + 1})">${o.label}</button>`).join('')}

          ${step.note ? `<p class="quiz-note">${step.note}</p>` : ''}
