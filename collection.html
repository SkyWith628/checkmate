<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="picture/cm.png">
  <title>Collection ⬦ CHECKMATE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/common.css">
  <style>
    body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── 네비게이션 ── */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 60px; border-bottom: 1px solid var(--sand);
      position: sticky; top: 0; background: var(--cream); z-index: 100;
    }
    .logo {
      font-family: var(--font-display); font-size: 28px; font-weight: 300;
      letter-spacing: 8px; color: var(--dark); text-decoration: none;
    }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.3s;
    }
    .nav-links a:hover,
    .nav-links a.active { color: var(--dark); }
    .nav-right { display: flex; gap: 20px; align-items: center; }
    .nav-icon-link { display: flex; align-items: center; }

    /* ── 페이지 헤더 ── */
    .page-header {
      padding: 64px 60px 0;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.05s forwards;
    }
    .header-eyebrow {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: var(--antique-gold); margin-bottom: 12px;
    }
    .header-title {
      font-family: var(--font-display); font-size: 64px; font-weight: 300;
      font-style: italic; color: var(--dark); line-height: 1;
      text-transform: capitalize;
    }


    /* ── 정렬/필터 바 ── */
    .filter-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 60px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.18s forwards;
    }
    .result-count { font-size: 12px; color: var(--muted); letter-spacing: 2px; }
    .sort-select {
      font-family: var(--font-body); font-size: 11px; letter-spacing: 2px;
      color: var(--muted); background: none;
      border: none; border-bottom: 1px solid var(--sand);
      padding: 4px 8px; cursor: pointer; outline: none;
      text-transform: uppercase;
    }

    /* ── 상품 그리드 ── */
    .product-section {
      flex: 1;
      padding: 0 60px 80px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.22s forwards;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
    }

    /* ── 상품 카드 ── */
    .product-card {
      cursor: pointer;
      background: var(--cream);
      position: relative;
    }
    .product-card:hover .product-img-wrap { background: var(--sand); }
    .product-img-wrap {
      aspect-ratio: 2/3;
      background: #F5F0E8;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
      transition: background 0.4s;
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: contain;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-img-wrap { background: var(--sand); }
    .product-card:hover .product-img-wrap img { transform: scale(1.04); }

    .product-placeholder {
      font-family: var(--font-display); font-style: italic;
      font-size: 13px; color: #C8C0B0; letter-spacing: 2px;
      user-select: none;
    }

    .product-info { padding: 14px 4px 22px; }
    .product-category {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--antique-gold); margin-bottom: 6px;
    }
    .product-name {
      font-family: var(--font-display); font-size: 17px; font-weight: 300;
      color: var(--dark); margin-bottom: 4px; line-height: 1.3;
    }
    .product-material {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .product-price { font-size: 13px; color: var(--antique-gold); letter-spacing: 1px; }

    /* 위시리스트 버튼 */
    .btn-wish {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; cursor: pointer;
      font-size: 18px; line-height: 1; color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      opacity: 0; z-index: 2;
    }
    .product-card:hover .btn-wish { opacity: 1; }
    .btn-wish:hover { color: var(--cherry); transform: scale(1.15); }
    .btn-wish.active { opacity: 1; color: var(--cherry); }

    /* ── 빈 상태 ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 0;
    }
    .empty-icon {
      font-family: var(--font-display); font-style: italic;
      font-size: 48px; color: var(--sand); margin-bottom: 20px;
    }
    .empty-text {
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── 상품 등록 안내 (관리자용) ── */
    .admin-add-hint {
      display: none;
      grid-column: 1 / -1;
      border: 1px dashed var(--sand);
      padding: 48px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    .admin-add-hint:hover { border-color: var(--antique-gold); }
    .admin-add-hint p {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted);
    }
    .admin-add-hint.visible { display: block; }

    /* ── 상품 추가 모달 (관리자) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(28,26,23,0.55); backdrop-filter: blur(2px);
      z-index: 900; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-box {
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      background: var(--cream); border: 1px solid var(--sand);
      padding: 48px 52px; position: relative;
      transform: translateY(16px);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-title {
      font-family: var(--font-display); font-size: 26px; font-weight: 300;
      font-style: italic; color: var(--dark); margin-bottom: 28px;
    }
    .modal-close {
      position: absolute; top: 20px; right: 24px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--muted); transition: color 0.2s;
    }
    .modal-close:hover { color: var(--cherry); }
    .modal-field { margin-bottom: 16px; }
    .modal-field label {
      display: block; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .modal-input, .modal-select {
      width: 100%; padding: 11px 14px;
      background: transparent; border: 1px solid var(--sand);
      font-family: var(--font-body); font-size: 13px;
      color: var(--dark); outline: none; box-sizing: border-box;
      transition: border-color 0.3s; letter-spacing: 1px;
    }
    .modal-input:focus, .modal-select:focus { border-color: var(--antique-gold); }
    .modal-input::placeholder { color: var(--sand); }
    .modal-select { background: var(--cream); cursor: pointer; appearance: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-modal-ok {
      flex: 1; padding: 13px; background: var(--dark); color: var(--cream);
      border: none; font-family: var(--font-body); font-size: 11px;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      transition: background 0.3s;
    }
    .btn-modal-ok:hover { background: var(--antique-gold); }
    .btn-modal-ok:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-modal-cancel {
      flex: 1; padding: 13px; background: transparent;
      border: 1px solid var(--sand); font-family: var(--font-body);
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: border-color 0.3s, color 0.3s;
    }
    .btn-modal-cancel:hover { border-color: var(--dark); color: var(--dark); }
    .modal-msg { font-size: 12px; color: var(--cherry); margin-top: 12px; min-height: 18px; }

    /* ── 상품 삭제 버튼 (관리자) ── */
    .btn-delete-product {
      display: none;
      position: absolute; top: 14px; left: 14px;
      background: rgba(28,26,23,0.7); border: none;
      color: #E2E2E2; font-size: 11px; letter-spacing: 1px;
      padding: 5px 10px; cursor: pointer;
      transition: background 0.2s; z-index: 3;
    }
    .btn-delete-product:hover { background: #C0392B; }
    .product-card:hover .btn-delete-product.visible { display: block; }

    /* ── 푸터 ── */
    footer {
      background: var(--dark); color: var(--sand);
      padding: 28px 60px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-logo {
      font-family: var(--font-display); font-size: 20px; font-weight: 300;
      letter-spacing: 6px; color: var(--sand); text-decoration: none;
    }
    .footer-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ── 네비게이션 ── -->
  <nav>
    <a class="logo" href="checkmate.html">CHECKMATE</a>
    <ul class="nav-links">
      <li><a href="collection.html?cat=pendant"  data-cat="pendant">pendant</a></li>
      <li><a href="collection.html?cat=ring"     data-cat="ring">ring</a></li>
      <li><a href="collection.html?cat=earring"  data-cat="earring">earring</a></li>
      <li><a href="collection.html?cat=bracelet" data-cat="bracelet">bracelet</a></li>
    </ul>
    <div class="nav-right">
      <div id="nav-user-area">
        <a href="login.html" class="nav-icon-link">
          <img src="picture/KakaoTalk_20260519_112050420.png" width="22" height="22" alt="사용자" style="display:block;">
        </a>
      </div>
      <a href="cart.html" class="nav-icon-link">
        <img src="picture/KakaoTalk_20260519_112053927.png" width="22" height="22" alt="장바구니" style="display:block;">
      </a>
    </div>
  </nav>

  <!-- ── 페이지 헤더 ── -->
  <div class="page-header">
    <p class="header-eyebrow" id="header-eyebrow">Collection</p>
    <h1 class="header-title" id="header-title">All</h1>
  </div>

  <!-- ── 결과 수 / 정렬 ── -->
  <div class="filter-bar">
    <p class="result-count" id="result-count">0 items</p>
    <select class="sort-select" id="sort-select" onchange="applySort()">
      <option value="newest">최신순</option>
      <option value="price-asc">가격 낮은순</option>
      <option value="price-desc">가격 높은순</option>
      <option value="popular">인기순</option>
    </select>
  </div>

  <!-- ── 상품 그리드 ── -->
  <div class="product-section">
    <div class="product-grid" id="product-grid">
      <div class="empty-state">
        <p class="empty-text">불러오는 중...</p>
      </div>
    </div>
  </div>

  <!-- ── 상품 추가 모달 (관리자) ── -->
  <div class="modal-overlay" id="add-modal" onclick="handleModalClick(event)">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2 class="modal-title">상품 추가</h2>

      <div class="modal-field">
        <label for="f-name">상품명</label>
        <input class="modal-input" type="text" id="f-name" placeholder="예) Rose Gold Pendant">
      </div>
      <div class="modal-field">
        <label for="f-cat">카테고리</label>
        <select class="modal-select" id="f-cat">
          <option value="pendant">Pendant</option>
          <option value="ring">Ring</option>
          <option value="earring">Earring</option>
          <option value="bracelet">Bracelet</option>
        </select>
      </div>
      <div class="modal-field">
        <label for="f-material">소재</label>
        <input class="modal-input" type="text" id="f-material" placeholder="예) 18K Rose Gold">
      </div>
      <div class="modal-field">
        <label for="f-price">가격 (원)</label>
        <input class="modal-input" type="number" id="f-price" placeholder="예) 198000">
      </div>
      <div class="modal-field">
        <label for="f-desc">상품 설명</label>
        <input class="modal-input" type="text" id="f-desc" placeholder="간단한 설명 (선택)">
      </div>
      <div class="modal-field">
        <label for="f-img">이미지 URL</label>
        <input class="modal-input" type="text" id="f-img" placeholder="https://... (선택)">
      </div>

      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeModal()">취소</button>
        <button class="btn-modal-ok" id="btn-add-ok" onclick="submitProduct()">등록</button>
      </div>
      <p class="modal-msg" id="add-msg"></p>
    </div>
  </div>

  <footer>
    <a class="footer-logo" href="checkmate.html">CHECKMATE</a>
    <p class="footer-text">© Collection</p>
  </footer>

  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { getAuth, onAuthStateChanged, signOut }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getFirestore, collection, getDocs, addDoc, deleteDoc,
      doc, getDoc, query, orderBy, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let allProducts = [];
    let currentCat  = '';
    let isAdmin     = false;

    /* ── URL 파라미터에서 카테고리 읽기 ── */
    const params = new URLSearchParams(location.search);
    currentCat = (params.get('cat') || '').toLowerCase();

    /* ── nav 링크 활성화 ── */
    document.querySelectorAll('.nav-links a').forEach(a => {
      if (a.dataset.cat === currentCat) a.classList.add('active');
    });

    /* ── 헤더 텍스트 ── */
    const TITLES = { pendant:'Pendant', ring:'Ring', earring:'Earring', bracelet:'Bracelet' };
    document.getElementById('header-title').textContent = TITLES[currentCat] || 'Collection';

    /* ── 로그인 상태 & 관리자 확인 ── */
    onAuthStateChanged(auth, async (user) => {
      const area = document.getElementById('nav-user-area');
      if (user) {
        let name = user.displayName || user.email;
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists()) {
            const d = snap.data();
            if (d.role === 'admin') isAdmin = true;
            name = d.firstName || d.name || name;
          }
        } catch {}
        area.innerHTML = `
          <a href="mypage.html" style="display:flex;align-items:center;text-decoration:none;">
            <span style="font-size:12px;letter-spacing:2px;color:var(--cherry);font-family:var(--font-body);">${name}&thinsp;님</span>
          </a>`;
      }

      loadProducts();
    });

    /* ── 상품 불러오기 ── */
    async function loadProducts() {
      try {
        const q = query(collection(db, 'products'), orderBy('createdAt', 'desc'));
        const snap = await getDocs(q);
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch {
        allProducts = [];
      }
      renderGrid();
    }

    /* ── 정렬 적용 ── */
    window.applySort = () => renderGrid();

    function getSorted(list) {
      const v = document.getElementById('sort-select').value;
      const arr = [...list];
      if (v === 'price-asc')  return arr.sort((a,b) => (a.price||0) - (b.price||0));
      if (v === 'price-desc') return arr.sort((a,b) => (b.price||0) - (a.price||0));
      if (v === 'name')       return arr.sort((a,b) => (a.name||'').localeCompare(b.name||''));
      if (v === 'popular')    return arr.sort((a,b) => (b.likeCount||0) - (a.likeCount||0));
      return arr; // newest (Firestore orderBy 기준)
    }

    /* ── 그리드 렌더 ── */
    function renderGrid() {
      const filtered = currentCat
        ? allProducts.filter(p => p.category === currentCat)
        : allProducts;
      const sorted = getSorted(filtered);
      const grid   = document.getElementById('product-grid');

      document.getElementById('result-count').textContent = `${sorted.length} items`;

      if (sorted.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <p class="empty-icon">✦</p>
            <p class="empty-text">등록된 상품이 없습니다</p>
          </div>
          ${isAdmin ? `<div class="admin-add-hint visible" onclick="openModal()">
            <p>＋ 상품 추가하기</p>
          </div>` : ''}`;
        return;
      }

      grid.innerHTML = sorted.map(p => {
        const price = p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '-';
        const img   = p.image
          ? `<img src="${p.image}" alt="${p.name}" loading="lazy">`
          : `<span class="product-placeholder">${p.category || '✦'}</span>`;
        return `
          <div class="product-card" data-id="${p.id}">
            ${isAdmin ? `<button class="btn-delete-product visible" onclick="deleteProduct(event,'${p.id}')">삭제</button>` : ''}
            <div class="product-img-wrap">
              ${img}
            </div>
            <div class="product-info">
              <p class="product-category">${p.category || ''}</p>
              <p class="product-name">${p.name || '-'}</p>
              <p class="product-price">${price}</p>
            </div>
          </div>`;
      }).join('');

      // 관리자: 마지막에 추가 버튼 추가
      if (isAdmin) {
        grid.insertAdjacentHTML('beforeend', `
          <div class="admin-add-hint visible" onclick="openModal()"><p>＋ 상품 추가하기</p></div>`);
      }
    }

    /* ── 관리자 상품 추가 ── */
    window.openModal = () => {
      if (currentCat) document.getElementById('f-cat').value = currentCat;
      document.getElementById('add-msg').textContent = '';
      document.getElementById('add-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    };
    window.closeModal = () => {
      document.getElementById('add-modal').classList.remove('open');
      document.body.style.overflow = '';
    };
    window.handleModalClick = e => {
      if (e.target === document.getElementById('add-modal')) closeModal();
    };

    window.submitProduct = async () => {
      const name     = document.getElementById('f-name').value.trim();
      const cat      = document.getElementById('f-cat').value;
      const material = document.getElementById('f-material').value.trim();
      const price    = document.getElementById('f-price').value;
      const desc     = document.getElementById('f-desc').value.trim();
      const image    = document.getElementById('f-img').value.trim();
      const msgEl    = document.getElementById('add-msg');

      if (!name) { msgEl.textContent = '상품명을 입력해 주세요.'; return; }
      if (!price || isNaN(price)) { msgEl.textContent = '가격을 숫자로 입력해 주세요.'; return; }

      const btn = document.getElementById('btn-add-ok');
      btn.disabled = true; msgEl.textContent = '등록 중...';
      try {
        await addDoc(collection(db, 'products'), {
          name, category: cat, material, price: Number(price),
          description: desc, image, createdAt: serverTimestamp()
        });
        closeModal();
        loadProducts();
      } catch (err) {
        msgEl.textContent = '등록에 실패했습니다.';
      } finally { btn.disabled = false; }
    };

    /* ── 관리자 상품 삭제 ── */
    window.deleteProduct = async (e, id) => {
      e.stopPropagation();
      if (!confirm('이 상품을 삭제하시겠습니까?')) return;
      try {
        await deleteDoc(doc(db, 'products', id));
        loadProducts();
      } catch { alert('삭제에 실패했습니다.'); }
    };

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
