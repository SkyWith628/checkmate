<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="picture/cm.png">
  <title>상품 상세 ⬦ CHECKMATE</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/common.css">
  <style>
    body { background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── 네비게이션 ── */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 60px; border-bottom: 1px solid var(--sand);
      position: sticky; top: 0; background: var(--cream); z-index: 100;
    }
    .logo { font-family: var(--font-display); font-size: 28px; font-weight: 300; letter-spacing: 8px; color: var(--dark); text-decoration: none; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.3s; }
    .nav-links a:hover { color: var(--dark); }
    .nav-right { display: flex; gap: 20px; align-items: center; }
    .nav-icon-link { display: flex; align-items: center; }
    .nav-user-logged { position: relative; cursor: pointer; text-decoration: none; }
    .nav-user-name { font-size: 12px; letter-spacing: 2px; color: var(--cherry); transition: color 0.3s; }
    .nav-user-logged:hover .nav-user-name { color: var(--dark); }

    /* ── 브레드크럼 ── */
    .breadcrumb {
      padding: 24px 60px 0;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--dark); }
    .breadcrumb span { margin: 0 8px; }

    /* ── 상품 상세 ── */
    .product-detail {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 40px 60px 80px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.1s forwards;
    }

    /* 이미지 영역 */
    .detail-img-col {
      position: sticky; top: 100px;
      height: fit-content;
      margin-right: 60px;
    }
    .detail-img-wrap {
      background: #F5F0E8;
      overflow: hidden;
      max-height: 400px;
    }
    .detail-img-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; max-height: 400px; }
    .detail-img-placeholder {
      font-family: var(--font-display); font-style: italic;
      font-size: 16px; color: #C8C0B0; letter-spacing: 3px;
      padding: 80px 0;
    }

    /* 이미지 썸네일 */
    .detail-img-thumbs {
      display: none; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .detail-img-thumb {
      width: 58px; height: 58px; flex-shrink: 0;
      background: #F5F0E8; overflow: hidden;
      border: 1px solid transparent; cursor: pointer;
      opacity: 0.5; transition: opacity 0.2s, border-color 0.2s;
    }
    .detail-img-thumb:hover { opacity: 0.85; }
    .detail-img-thumb.active { border-color: var(--antique-gold); opacity: 1; }
    .detail-img-thumb img { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* 상품 정보 영역 */
    .detail-info { padding-top: 8px; }
    .detail-category {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--antique-gold); margin-bottom: 16px;
    }
    .detail-name {
      font-family: var(--font-display); font-size: 44px; font-weight: 300;
      font-style: italic; color: var(--dark); line-height: 1.15; margin-bottom: 14px;
    }
    .detail-material {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 28px;
    }
    .detail-divider { width: 40px; height: 1px; background: var(--sand); margin-bottom: 28px; }
    .detail-price {
      font-family: var(--font-display); font-size: 32px; font-weight: 300;
      color: var(--antique-gold); margin-bottom: 20px; letter-spacing: 1px;
    }
    .detail-desc {
      font-size: 13px; color: var(--muted); line-height: 2; letter-spacing: 0.5px;
      margin-bottom: 36px;
    }

    /* 수량 */
    .qty-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .qty-wrap { display: flex; align-items: center; gap: 0; margin-bottom: 32px; }
    .qty-btn {
      width: 36px; height: 36px; background: none;
      border: 1px solid var(--sand); color: var(--dark);
      font-size: 16px; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--sand); }
    .qty-num {
      width: 52px; height: 36px; border-top: 1px solid var(--sand); border-bottom: 1px solid var(--sand);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--dark); letter-spacing: 1px;
    }

    /* 구매하기 버튼 */
    .btn-buy {
      width: 100%; padding: 18px;
      background: var(--dark); color: var(--cream);
      border: none; font-family: var(--font-body);
      font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s; margin-bottom: 12px;
    }
    .btn-buy:hover { background: var(--antique-gold); }
    .btn-buy:disabled, .btn-cart:disabled {
      opacity: 0.4; cursor: not-allowed; pointer-events: none;
    }
    .soldout-notice {
      width: 100%; padding: 16px; margin-bottom: 12px;
      border: 1px solid var(--cherry); color: var(--cherry);
      font-family: var(--font-body); font-size: 11px;
      letter-spacing: 4px; text-transform: uppercase; text-align: center;
      display: none;
    }
    .btn-restock {
      width: 100%; padding: 16px; margin-bottom: 12px;
      background: transparent; color: var(--dark);
      border: 1px solid var(--dark); font-family: var(--font-body);
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s, color 0.3s;
    }
    .btn-restock:hover { background: var(--dark); color: var(--cream); }
    .btn-restock.subscribed { border-color: var(--antique-gold); color: var(--antique-gold); }
    .btn-restock.subscribed:hover { background: var(--antique-gold); color: var(--cream); }
    .btn-cart {
      width: 100%; padding: 16px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--sand); font-family: var(--font-body);
      font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.3s, color 0.3s;
    }
    .btn-cart:hover { border-color: var(--dark); color: var(--dark); }
    .btn-like {
      width: 100%; padding: 15px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--sand); font-family: var(--font-body);
      font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.3s, color 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin-top: 8px;
    }
    .btn-like:hover { border-color: var(--cherry); color: var(--cherry); }
    .btn-like.liked { border-color: var(--cherry); color: var(--cherry); }
    .btn-like.liked svg path { fill: currentColor; }

    /* ── 결제 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(28,26,23,0.55); backdrop-filter: blur(2px);
      z-index: 900; display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal-box {
      width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto;
      background: var(--cream); border: 1px solid var(--sand);
      padding: 52px 56px; position: relative;
      transform: translateY(16px);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 20px; right: 24px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: var(--muted); transition: color 0.2s;
    }
    .modal-close:hover { color: var(--cherry); }
    .modal-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--antique-gold); margin-bottom: 8px; }
    .modal-title { font-family: var(--font-display); font-size: 28px; font-weight: 300; font-style: italic; color: var(--dark); margin-bottom: 32px; }

    /* 주문 요약 */
    .order-summary {
      display: flex; gap: 16px; align-items: center;
      padding: 16px; background: #F8F4EC;
      border: 1px solid var(--sand); margin-bottom: 28px;
    }
    .summary-img { width: 60px; height: 60px; object-fit: cover; background: var(--sand); flex-shrink: 0; }
    .summary-img-placeholder { width: 60px; height: 60px; background: var(--sand); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--muted); flex-shrink: 0; }

    .summary-name { font-family: var(--font-display); font-size: 16px; font-style: italic; color: var(--dark); margin-bottom: 4px; }
    .summary-sub { font-size: 11px; letter-spacing: 1px; color: var(--muted); }
    .summary-price { margin-left: auto; font-size: 15px; color: var(--antique-gold); letter-spacing: 1px; white-space: nowrap; }

    .section-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; margin-top: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 11px 14px; background: transparent;
      border: 1px solid var(--sand); font-family: var(--font-body);
      font-size: 13px; color: var(--dark); outline: none;
      box-sizing: border-box; transition: border-color 0.3s; letter-spacing: 1px;
      resize: none;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--antique-gold); }
    .field input::placeholder, .field textarea::placeholder { color: #D0C8BC; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field { flex: 1; }

    /* 결제 방법 */
    .pay-methods { display: flex; gap: 8px; margin-bottom: 24px; }
    .pay-method {
      flex: 1; padding: 12px 8px; border: 1px solid var(--sand);
      background: none; font-family: var(--font-body); font-size: 11px;
      letter-spacing: 1px; color: var(--muted); cursor: pointer;
      transition: all 0.2s; text-align: center;
    }
    .pay-method.selected { border-color: var(--dark); color: var(--dark); background: #F5F1EA; }

    .total-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-top: 1px solid var(--sand); margin-top: 8px; }
    .total-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
    .total-price { font-family: var(--font-display); font-size: 24px; font-weight: 300; color: var(--antique-gold); }

    .btn-confirm {
      width: 100%; padding: 16px; background: var(--dark); color: var(--cream);
      border: none; font-family: var(--font-body); font-size: 12px;
      letter-spacing: 4px; text-transform: uppercase; cursor: pointer;
      transition: background 0.3s; margin-top: 8px;
    }
    .btn-confirm:hover { background: var(--antique-gold); }
    .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-msg { font-size: 12px; color: var(--cherry); margin-top: 10px; min-height: 18px; }

    /* 완료 화면 */
    .order-done { text-align: center; padding: 20px 0; display: none; }
    .done-symbol { font-family: var(--font-display); font-style: italic; font-size: 52px; color: var(--antique-gold); margin-bottom: 16px; }
    .done-title { font-family: var(--font-display); font-size: 26px; font-weight: 300; font-style: italic; color: var(--dark); margin-bottom: 12px; }
    .done-desc { font-size: 12px; color: var(--muted); letter-spacing: 2px; line-height: 2; margin-bottom: 32px; }
    .btn-done { display: inline-block; padding: 13px 36px; background: var(--dark); color: var(--cream); border: none; font-family: var(--font-body); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background 0.3s; }
    .btn-done:hover { background: var(--antique-gold); }

    /* ── 장바구니 뱃지 ── */
    .cart-icon-wrap { position: relative; display: flex; align-items: center; }
    .cart-badge {
      position: absolute; top: -6px; right: -7px;
      background: var(--cherry); color: #fff;
      font-size: 9px; font-family: var(--font-body);
      width: 16px; height: 16px; border-radius: 50%;
      align-items: center; justify-content: center;
      display: none;
    }
    .cart-badge.show { display: flex; }

    /* ── 쿠폰 ── */
    .coupon-row { display:flex; gap:8px; margin-bottom:6px; }
    .coupon-input {
      flex:1; padding:11px 14px; background:transparent;
      border:1px solid var(--sand); font-family:var(--font-body);
      font-size:13px; color:var(--dark); outline:none;
      letter-spacing:2px; transition:border-color 0.3s; text-transform:uppercase;
    }
    .coupon-input:focus { border-color:var(--antique-gold); }
    .coupon-input::placeholder { color:#D0C8BC; text-transform:none; letter-spacing:0; }
    .btn-coupon {
      padding:11px 18px; background:var(--dark); color:var(--cream);
      border:none; font-family:var(--font-body); font-size:11px;
      letter-spacing:2px; text-transform:uppercase; cursor:pointer;
      transition:background 0.3s; white-space:nowrap;
    }
    .btn-coupon:hover { background:var(--antique-gold); }
    .coupon-msg { font-size:12px; min-height:16px; margin-bottom:4px; letter-spacing:0.5px; }
    .coupon-msg.success { color:#6B9E6B; }
    .coupon-msg.error   { color:var(--cherry); }
    .coupon-applied-bar {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 14px; margin-bottom:6px;
      background:rgba(107,158,107,0.08); border:1px solid rgba(107,158,107,0.35);
      font-size:12px; color:#6B9E6B; letter-spacing:0.5px;
    }
    .btn-coupon-remove {
      background:none; border:none; cursor:pointer; color:var(--muted);
      font-size:16px; line-height:1; transition:color 0.2s;
    }
    .btn-coupon-remove:hover { color:var(--cherry); }
    .discount-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom:1px solid var(--sand); margin-bottom:0;
      font-size:13px;
    }
    .discount-label { color:var(--muted); letter-spacing:1px; }
    .discount-value { color:#6B9E6B; }

    /* ── 리뷰 ── */
    .reviews-section { padding: 60px 60px 80px; border-top: 1px solid var(--sand); }
    .reviews-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 32px; }
    .reviews-title { font-family: var(--font-display); font-size: 28px; font-weight: 300; font-style: italic; }
    .rating-summary { display: flex; align-items: center; gap: 10px; }
    .avg-score { font-family: var(--font-display); font-size: 36px; font-weight: 300; color: var(--antique-gold); }
    .stars { color: var(--antique-gold); font-size: 16px; letter-spacing: 2px; }
    .review-count-label { font-size: 12px; color: var(--muted); letter-spacing: 2px; }
    .review-form-wrap { background: #FAF7F2; border: 1px solid var(--sand); padding: 28px 32px; margin-bottom: 32px; }
    .review-form-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
    .star-input { display: flex; gap: 6px; margin-bottom: 16px; cursor: pointer; font-size: 24px; }
    .star-input span { color: #D0C8BC; transition: color 0.15s; }
    .star-input span.on { color: var(--antique-gold); }
    .review-textarea {
      width: 100%; min-height: 90px; padding: 12px 14px;
      background: transparent; border: 1px solid var(--gold);
      font-family: var(--font-body); font-size: 13px; color: var(--dark);
      outline: none; resize: vertical; box-sizing: border-box; letter-spacing: 0.5px;
    }
    .review-textarea:focus { border-color: var(--antique-gold); }
    .review-textarea::placeholder { color: var(--gold); }
    .btn-review-submit {
      margin-top: 12px; padding: 12px 32px;
      background: var(--dark); color: var(--cream);
      border: none; font-family: var(--font-body); font-size: 11px;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      transition: background 0.3s;
    }
    .btn-review-submit:hover { background: var(--antique-gold); }
    .btn-review-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .review-msg { font-size: 12px; color: var(--cherry); margin-top: 8px; min-height: 16px; }
    .review-list { display: flex; flex-direction: column; gap: 0; }
    .review-item { padding: 24px 0; border-bottom: 1px solid var(--sand); display: flex; gap: 20px; }
    .review-item:last-child { border-bottom: none; }
    .review-meta { min-width: 120px; }
    .review-author { font-size: 13px; font-weight: 600; color: var(--dark); letter-spacing: 1px; }
    .review-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .review-stars { color: var(--antique-gold); font-size: 13px; margin-top: 6px; }
    .review-body { flex: 1; }
    .review-comment { font-size: 14px; color: var(--dark); line-height: 1.8; }
    .btn-review-delete { font-size: 10px; color: var(--muted); background: none; border: none; cursor: pointer; margin-top: 8px; letter-spacing: 1px; transition: color 0.2s; }
    .btn-review-delete:hover { color: var(--cherry); }
    .reviews-login-prompt { font-size: 13px; color: var(--muted); letter-spacing: 1px; }
    .reviews-login-prompt a { color: var(--cherry); text-decoration: none; }
    .reviews-empty { font-size: 13px; color: var(--muted); letter-spacing: 2px; padding: 20px 0; }
    .review-photo-label { display: inline-block; margin-top: 10px; padding: 8px 16px; border: 1px solid var(--sand); font-size: 11px; letter-spacing: 2px; color: var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .review-photo-label:hover { border-color: var(--dark); color: var(--dark); }
    .review-photo-preview { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .review-photo-preview img { width: 72px; height: 72px; object-fit: cover; border: 1px solid var(--sand); }
    .review-photo-preview .rm-photo { display: block; font-size: 9px; color: var(--muted); text-align: center; cursor: pointer; background: none; border: none; padding: 2px 0; }
    .review-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .review-photos img { width: 80px; height: 80px; object-fit: cover; border: 1px solid var(--sand); cursor: pointer; transition: opacity 0.2s; }
    .review-photos img:hover { opacity: 0.8; }
    .verified-badge { font-size: 10px; color: #6B9E6B; letter-spacing: 1px; margin-top: 4px; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 36px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--dark); color: var(--cream);
      padding: 12px 28px; font-size: 12px; letter-spacing: 2px;
      opacity: 0; pointer-events: none; z-index: 1000;
      transition: opacity 0.3s, transform 0.3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── 로딩 ── */
    .loading-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    .loading-text { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }

    /* ── 푸터 ── */
    footer { background: var(--dark); color: var(--sand); padding: 28px 60px; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { font-family: var(--font-display); font-size: 20px; font-weight: 300; letter-spacing: 6px; color: var(--sand); text-decoration: none; }
    .footer-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

    /* ── 검색 인라인 ── */
    .search-wrap { display: flex; align-items: center; gap: 8px; position: relative; }
    .search-input-inline {
      width: 0; opacity: 0; border: none;
      border-bottom: 1px solid transparent; background: transparent;
      font-family: var(--font-body); font-size: 13px; letter-spacing: 2px; color: var(--dark);
      outline: none; padding: 3px 0; overflow: hidden;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s, border-color 0.3s;
    }
    .search-input-inline::placeholder { color: var(--gold); font-size: 12px; }
    .search-wrap.active .search-input-inline { width: 200px; opacity: 1; border-bottom-color: var(--gold); }
    .search-input-inline:focus { border-bottom-color: var(--antique-gold) !important; }
    .btn-search { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; flex-shrink: 0; }
    .search-results {
      position: absolute; top: calc(100% + 14px); right: 0;
      width: 340px; background: var(--cream); border: 1px solid var(--sand);
      box-shadow: 0 8px 32px rgba(28,26,23,0.10);
      z-index: 1000; display: none;
    }
    .search-wrap.active .search-results.has-results { display: block; }
    .search-result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 16px; text-decoration: none; color: inherit;
      transition: background 0.2s; border-bottom: 1px solid var(--sand);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #F8F4EC; }
    .sri-img {
      width: 44px; height: 44px; flex-shrink: 0; background: var(--sand);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-style: italic; font-size: 11px; color: var(--muted);
    }

    .sri-info { flex: 1; min-width: 0; }

    .search-empty { padding: 20px 16px; font-size: 12px; color: var(--muted); letter-spacing: 1px; text-align: center; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 옵션 선택 ── */
    .option-group { margin-bottom: 24px; }
    .option-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .option-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .option-btn {
      padding: 8px 16px; border: 1px solid var(--sand);
      background: none; font-family: var(--font-body); font-size: 12px;
      color: var(--muted); cursor: pointer; letter-spacing: 1px;
      transition: all 0.2s;
    }
    .option-btn:hover { border-color: var(--dark); color: var(--dark); }
    .option-btn.selected { border-color: var(--dark); background: var(--dark); color: var(--cream); }
    .option-required { font-size: 11px; color: var(--cherry); margin-top: 8px; display: none; }
    .option-required.show { display: block; }
    .option-price-tag {
      font-size: 10px; color: var(--antique-gold);
      margin-left: 5px; letter-spacing: 0.5px; white-space: nowrap;
    }
    .option-btn.selected .option-price-tag { color: rgba(255,255,255,0.75); }
    .option-btn:disabled { opacity: 0.45; cursor: not-allowed; text-decoration: line-through; border-style: dashed; }
    .option-btn:disabled:hover { border-color: var(--sand); color: var(--muted); background: none; }
    .option-stock-low     { font-size: 10px; color: var(--antique-gold); margin-left: 5px; white-space: nowrap; }
    .option-stock-soldout { font-size: 10px; color: var(--cherry);       margin-left: 5px; white-space: nowrap; }
    .option-btn.selected .option-stock-low { color: rgba(255,255,255,0.75); }
    .detail-price-adj {
      font-size: 13px; color: var(--muted); letter-spacing: 1px;
      margin-left: 8px; font-family: var(--font-body);
    }

    /* ── 장바구니 담김 확인 패널 ── */
    .cart-confirm {
      position: fixed; top: 0; right: 0;
      width: 320px; background: var(--cream);
      border-left: 1px solid var(--sand); border-bottom: 1px solid var(--sand);
      padding: 24px 28px; z-index: 1100;
      transform: translateY(-110%);
      transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -2px 4px 24px rgba(0,0,0,0.09);
    }
    .cart-confirm.show { transform: translateY(0); }
    .cc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .cc-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--antique-gold); }
    .cc-close {
      background: none; border: none; font-size: 16px;
      color: var(--muted); cursor: pointer; transition: color 0.2s; line-height: 1;
    }
    .cc-close:hover { color: var(--cherry); }
    .cc-product { display: flex; gap: 14px; align-items: center; margin-bottom: 20px; }
    .cc-img {
      width: 56px; height: 56px; object-fit: cover;
      background: var(--sand); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-style: italic; font-size: 14px; color: var(--gold);
      overflow: hidden;
    }
    .cc-img img { width: 100%; height: 100%; object-fit: cover; }
    .cc-name { font-family: var(--font-display); font-size: 15px; font-style: italic; color: var(--dark); line-height: 1.3; }
    .cc-sub { font-size: 11px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; line-height: 1.5; }
    .btn-go-cart {
      display: block; width: 100%; padding: 13px;
      background: var(--dark); color: var(--cream); border: none;
      font-family: var(--font-body); font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; text-align: center; text-decoration: none;
      cursor: pointer; transition: background 0.3s; box-sizing: border-box;
    }
    .btn-go-cart:hover { background: var(--cherry); }
    .btn-keep-shopping {
      display: block; width: 100%; padding: 11px; margin-top: 8px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--sand); font-family: var(--font-body);
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      text-align: center; cursor: pointer; transition: color 0.3s, border-color 0.3s;
    }
    .btn-keep-shopping:hover { color: var(--dark); border-color: var(--dark); }
    .cc-progress {
      height: 2px; background: var(--sand); margin-top: 16px; overflow: hidden;
    }
    .cc-progress-bar {
      height: 100%; background: var(--antique-gold);

    /* ── 반응형 (모바일) ── */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }

      footer { padding: 20px; flex-direction: column; gap: 8px; }

  </style>
</head>

  <script type="module">
    import { initializeApp }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, collection, serverTimestamp, updateDoc, arrayUnion, arrayRemove, query, where, getDocs, increment, deleteField, orderBy, deleteDoc }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app  = initializeApp(firebaseConfig);
    const auth    = getAuth(app);
    const db      = getFirestore(app);

    const CAT_LABEL = { pendant:'Pendant', ring:'Ring', earring:'Earring', bracelet:'Bracelet' };
    const CAT_HREF  = { pendant:'pendant.html', ring:'ring.html', earring:'earring.html', bracelet:'bracelet.html' };

    let product      = null;
    let qty          = 1;
    let selectedOpts = {};     // { '옵션이름': { val: string, price: number } }
    let currentUser  = null;
    let payMethod    = 'card';
    let appliedCoupon = null;  // { code, discountType, discountValue, minAmount }
    let likedSet     = new Set();
    let likeInProgress = new Set();

    // URL에서 id 가져오기
    const productId = new URLSearchParams(location.search).get('id');

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        let name = user.displayName || user.email;
        // 배송 정보 자동 입력 + 찜 목록 로드
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists()) {
            const d = snap.data();
            name = d.firstName || d.name || name;
            document.getElementById('o-name').value  = d.name  || '';
            document.getElementById('o-phone').value = d.phone || '';
            document.getElementById('o-addr').value  = d.location || '';
            likedSet = new Set(d.likedProducts || []);
          }
        } catch {}
        document.getElementById('nav-user-area').innerHTML = `
          <a class="nav-user-logged" href="mypage.html">
            <span class="nav-user-name">${name}&thinsp;님</span>
          </a>`;
      } else {
        likedSet = new Set();
      }
      loadProduct();
    });


    async function loadProduct() {
      if (!productId) { showError('상품 정보를 찾을 수 없습니다.'); return; }
      try {
        const snap = await getDoc(doc(db, 'products', productId));
        if (!snap.exists()) { showError('존재하지 않는 상품입니다.'); return; }
        product = { id: snap.id, ...snap.data() };
        renderProduct();
      } catch {
        showError('상품을 불러오지 못했습니다.');
      }
    }

    async function renderProduct() {
      const cat = product.category || '';
      const price = product.price ? Number(product.price).toLocaleString('ko-KR') + '원' : '-';

      // 브레드크럼
      const bc = document.getElementById('breadcrumb');
      bc.style.display = 'block';
      bc.innerHTML = `<a href="${CAT_HREF[cat] || 'checkmate.html'}">${CAT_LABEL[cat] || 'Collection'}</a><span>›</span>${product.name || ''}`;

      // 이미지 갤러리
      const images = (product.images && product.images.length > 0)
        ? product.images.filter(Boolean)
        : (product.image ? [product.image] : []);
      renderImageGallery(images, product.name, CAT_LABEL[cat] || '✦');

      document.getElementById('detail-category').textContent  = CAT_LABEL[cat] || '';
      document.getElementById('detail-name').textContent      = product.name || '';
      // detail-material은 검색 키워드 전용 — 상품 페이지에 표시하지 않음
      document.getElementById('detail-price').textContent     = price;
      document.getElementById('detail-desc').textContent      = product.description || '';

      // 옵션 렌더링
      renderOptions();

      document.getElementById('loading-wrap').style.display  = 'none';
      document.getElementById('product-detail').style.display = 'grid';

      // 찜 버튼 초기 상태
      document.getElementById('btn-like').classList.toggle('liked', likedSet.has(productId));
      updateLikeCount(product.likeCount || 0);

      // 품절 처리
      const allOptsSO = (product.options || []).length > 0 &&
        (product.options || []).every(g => (g.values || []).length > 0 &&
          (g.values || []).every(v => v.stock === 0));
      const isSO = product.soldOut || product.stock === 0 || allOptsSO;
      document.getElementById('soldout-notice').style.display = isSO ? 'block' : 'none';
      document.getElementById('btn-buy').disabled  = isSO;
      document.getElementById('btn-cart').disabled = isSO;
      document.querySelectorAll('.qty-btn').forEach(b => b.disabled = isSO);

      // 재입고 알림 버튼
      const restockBtn = document.getElementById('btn-restock');
      if (isSO && currentUser) {
        restockBtn.style.display = 'block';
        try {
          const rSnap = await getDoc(doc(db, 'restock_alerts', productId));
          const subs = rSnap.exists() ? (rSnap.data().subscribers || []) : [];
          if (subs.includes(currentUser.uid)) {
            restockBtn.textContent = '알림 신청 취소';
            restockBtn.classList.add('subscribed');
          }
        } catch {}
      }

      // 뒤로가기 링크
      document.getElementById('btn-back-collection').href = CAT_HREF[cat] || 'checkmate.html';
    }

    function showError(msg) {
      document.getElementById('loading-wrap').innerHTML = `<p class="loading-text">${msg}</p>`;
    }

    /* ── 이미지 갤러리 ── */
    let galleryImages = [];

    function renderImageGallery(images, name, catLabel) {
      galleryImages = images;
      const imgWrap   = document.getElementById('detail-img-wrap');
      const thumbWrap = document.getElementById('detail-img-thumbs');

      if (images.length === 0) {
        imgWrap.innerHTML = `<span class="detail-img-placeholder">${catLabel}</span>`;
        thumbWrap.style.display = 'none';
        return;
      }

      // 메인 이미지
      imgWrap.innerHTML = `<img id="detail-main-img" src="${images[0]}" alt="${name}">`;

      // 썸네일 (2장 이상일 때만)
      if (images.length > 1) {
        thumbWrap.innerHTML = images.map((url, i) => `
          <div class="detail-img-thumb ${i === 0 ? 'active' : ''}" data-idx="${i}">
            <img src="${url}" alt="">
          </div>`).join('');
        thumbWrap.style.display = 'flex';

        thumbWrap.addEventListener('click', e => {
          const thumb = e.target.closest('.detail-img-thumb');
          if (!thumb) return;
          const idx = Number(thumb.dataset.idx);
          const mainImg = document.getElementById('detail-main-img');
          if (mainImg) {
            mainImg.style.opacity = '0';
            mainImg.style.transition = 'opacity 0.2s';
            setTimeout(() => {
              mainImg.src = galleryImages[idx];
              mainImg.style.opacity = '1';
            }, 150);
          }
          thumbWrap.querySelectorAll('.detail-img-thumb')
            .forEach((t, i) => t.classList.toggle('active', i === idx));
        });
      } else {
        thumbWrap.style.display = 'none';
      }
    }

    /* ── 옵션 ── */
    function getOptionGroups() {
      const opts = product?.options;
      if (!opts || opts.length === 0) return [];
      if (typeof opts[0] === 'object') {
        // 새 형식: values가 string[] 이거나 {name,price}[] 모두 정규화 (구 priceAdj 호환)
        return opts.map(g => ({
          ...g,
          values: (g.values || []).map(v =>
            typeof v === 'string'
              ? { name: v, price: 0, stock: null }
              : { name: v.name || '', price: Number(v.price ?? v.priceAdj) || 0, stock: v.stock ?? null }
          )
        }));
      }
      // 구형식: string[] → 단일 그룹
      return [{ label: '옵션', values: opts.map(v => ({ name: v, price: 0 })) }];
    }

    function getEffectivePrice() {
      const base = Number(product?.price) || 0;
      // 가격이 설정된 옵션이 선택되면 그 가격 자체를 사용 (절대값)
      for (const v of Object.values(selectedOpts)) {
        if (Number(v.price) > 0) return Number(v.price);
      }
      return base;
    }

    function updateDisplayPrice() {
      document.getElementById('detail-price').textContent =
        getEffectivePrice().toLocaleString('ko-KR') + '원';
    }

    function renderOptions() {
      const groups = getOptionGroups();
      if (groups.length === 0 || groups.every(g => !g.values || g.values.length === 0)) return;
      selectedOpts = {};
      const wrap = document.getElementById('options-wrap');
      wrap.style.display = 'block';

      const esc = s => String(s).replace(/"/g, '&quot;');
      wrap.innerHTML = groups.map((g, gi) => {
        const vals = (g.values || []).map(v => {
          const price    = Number(v.price) || 0;
          const stock    = v.stock ?? null;
          const isSoldOut = stock === 0;
          const isLow    = stock !== null && stock > 0 && stock <= 5;
          const priceTag = price > 0
            ? `<span class="option-price-tag">${price.toLocaleString('ko-KR')}원</span>`
            : '';
          const stockTag = isSoldOut
            ? `<span class="option-stock-soldout">품절</span>`
            : isLow
            ? `<span class="option-stock-low">${stock}개 남음</span>`
            : '';
          return `<button class="option-btn"
                    ${isSoldOut ? 'disabled' : ''}
                    data-gi="${gi}"
                    data-val="${esc(v.name)}"
                    data-price="${price}"
                    data-label="${esc(g.label || '옵션')}">${esc(v.name)}${priceTag}${stockTag}</button>`;
        }).join('');
        return `<div class="option-group">
          <p class="option-label">${g.label || '옵션'}</p>
          <div class="option-btns" id="option-btns-${gi}">${vals}</div>
          <p class="option-required" id="option-required-${gi}">옵션을 선택해 주세요.</p>
        </div>`;
      }).join('');

      wrap.addEventListener('click', e => {
        const btn = e.target.closest('.option-btn');
        if (!btn) return;
        const gi       = Number(btn.dataset.gi);
        const val      = btn.dataset.val;
        const label    = btn.dataset.label;
        const price = Number(btn.dataset.price) || 0;
        document.getElementById(`option-btns-${gi}`)
          .querySelectorAll('.option-btn')
          .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOpts[label] = { val, price };
        const req = document.getElementById(`option-required-${gi}`);
        if (req) req.classList.remove('show');
        updateDisplayPrice(); // 가격 실시간 반영
      });
    }

    function checkOptionSelected() {
      const groups = getOptionGroups().filter(g => g.values && g.values.length > 0);
      if (groups.length === 0) return true;
      let ok = true;
      groups.forEach((g, gi) => {
        const label = g.label || '옵션';
        if (!selectedOpts[label]) {
          const req = document.getElementById(`option-required-${gi}`);
          if (req) req.classList.add('show');
          ok = false;
        }
      });
      if (!ok) document.getElementById('options-wrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
      return ok;
    }

    function optionSummary() {
      return Object.entries(selectedOpts).map(([k, v]) => `${k}: ${v.val}`).join(' / ') || null;
    }

    /* ── 수량 ── */
    window.changeQty = (d) => {
      qty = Math.max(1, qty + d);
      document.getElementById('qty-num').textContent = qty;
    };

    /* ── 결제 모달 ── */
    function calcTotal(unitPrice) {
      const base = unitPrice * qty;
      if (!appliedCoupon) return base;
      if (appliedCoupon.discountType === 'percent') {
        return Math.max(0, Math.round(base * (1 - appliedCoupon.discountValue / 100)));
      }
      return Math.max(0, base - appliedCoupon.discountValue);
    }

    function updateTotalDisplay() {
      const unitPrice = getEffectivePrice();
      const base  = unitPrice * qty;
      const total = calcTotal(unitPrice);
      const fmt   = (n) => n.toLocaleString('ko-KR') + '원';
      document.getElementById('total-price').textContent = fmt(total);
      const discountRow = document.getElementById('discount-row');
      if (appliedCoupon && total < base) {
        document.getElementById('discount-value').textContent = `−${(base - total).toLocaleString('ko-KR')}원`;
        discountRow.style.display = 'flex';
      } else {
        discountRow.style.display = 'none';
      }
    }

    window.openPayModal = () => {
      if (!product) return;
      if (!checkOptionSelected()) return;
      const unitPrice = getEffectivePrice();
      const fmt = (n) => n.toLocaleString('ko-KR') + '원';

      // 쿠폰 초기화
      appliedCoupon = null;
      document.getElementById('coupon-msg').textContent  = '';
      document.getElementById('coupon-msg').className    = 'coupon-msg';
      document.getElementById('coupon-applied-wrap').style.display = 'none';
      document.getElementById('coupon-select-wrap').style.display  = '';
      document.getElementById('discount-row').style.display        = 'none';
      loadUserCoupons();

      // 요약
      const imgWrap = document.getElementById('summary-img-wrap');
      imgWrap.innerHTML = product.image
        ? `<img class="summary-img" src="${product.image}" alt="">`
        : `<div class="summary-img-placeholder">${CAT_LABEL[product.category] || '✦'}</div>`;
      document.getElementById('summary-name').textContent  = product.name || '';
      const optSum = optionSummary();
      const optText = optSum ? ` · ${optSum}` : '';
      document.getElementById('summary-sub').textContent   = `${optText ? optText.replace(/^ · /, '') + ' · ' : ''}수량 ${qty}개`;
      document.getElementById('summary-price').textContent = fmt(unitPrice);
      document.getElementById('total-price').textContent   = fmt(unitPrice * qty);

      document.getElementById('order-form-wrap').style.display = 'block';
      document.getElementById('order-done').style.display      = 'none';
      document.getElementById('order-msg').textContent = '';
      document.getElementById('pay-modal').classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    window.closePayModal = () => {
      document.getElementById('pay-modal').classList.remove('open');
      document.body.style.overflow = '';
    };

    window.selectMethod = (el) => {
      document.querySelectorAll('.pay-method').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      payMethod = el.dataset.method;
    };

    /* ── 쿠폰 ── */
    async function loadUserCoupons() {
      const sel   = document.getElementById('coupon-select');
      const msgEl = document.getElementById('coupon-msg');
      sel.innerHTML = '<option value="">쿠폰을 선택하세요</option>';

      if (!currentUser) {
        msgEl.textContent = '로그인 후 쿠폰을 사용할 수 있습니다.';
        msgEl.className = 'coupon-msg'; return;
      }
      msgEl.textContent = ''; msgEl.className = 'coupon-msg';
      try {
        const [userSnap, couponSnap] = await Promise.all([
          getDoc(doc(db, 'users', currentUser.uid)),
          getDoc(doc(db, 'products', '_coupons')),
        ]);
        const collected   = userSnap.data()?.collectedCoupons || [];
        const activeCodes = new Set((couponSnap.data()?.list || []).filter(c => c.isActive !== false).map(c => c.code));
        const valid = collected.filter(c => activeCodes.has(c.code));
        if (!valid.length) {
          sel.innerHTML = '<option value="">사용 가능한 쿠폰이 없습니다</option>';
          return;
        }
        valid.forEach(c => {
          const label = c.discountType === 'percent'
            ? `${c.name || c.code} (${c.discountValue}% 할인)`
            : `${c.name || c.code} (${Number(c.discountValue).toLocaleString('ko-KR')}원 할인)`;
          sel.innerHTML += `<option value="${c.code}">${label}</option>`;
        });
        sel._coupons = valid;
      } catch {
        msgEl.textContent = '쿠폰 목록을 불러오지 못했습니다.'; msgEl.className = 'coupon-msg error';
      }
    }

    window.applyCouponFromSelect = (sel) => {
      const code  = sel.value;
      const msgEl = document.getElementById('coupon-msg');
      if (!code) {
        appliedCoupon = null;
        document.getElementById('coupon-applied-wrap').style.display = 'none';
        document.getElementById('coupon-select-wrap').style.display  = '';
        document.getElementById('discount-row').style.display        = 'none';
        updateTotalDisplay(); return;
      }
      const coupon = (sel._coupons || []).find(c => c.code === code);
      if (!coupon) return;
      const base = getEffectivePrice() * qty;
      if (coupon.minAmount > 0 && base < coupon.minAmount) {
        msgEl.textContent = `${Number(coupon.minAmount).toLocaleString('ko-KR')}원 이상 주문 시 사용 가능합니다.`;
        msgEl.className = 'coupon-msg error'; sel.value = ''; return;
      }
      appliedCoupon = coupon;
      const label = coupon.discountType === 'percent'
        ? `${coupon.name || coupon.code} — ${coupon.discountValue}% 할인`
        : `${coupon.name || coupon.code} — ${Number(coupon.discountValue).toLocaleString('ko-KR')}원 할인`;
      document.getElementById('coupon-applied-label').textContent = `✓ ${label}`;
      document.getElementById('coupon-applied-wrap').style.display = '';
      document.getElementById('coupon-select-wrap').style.display  = 'none';
      msgEl.textContent = ''; msgEl.className = 'coupon-msg';
      updateTotalDisplay();
    };

    window.removeCoupon = () => {
      appliedCoupon = null;
      document.getElementById('coupon-applied-wrap').style.display = 'none';
      document.getElementById('coupon-select-wrap').style.display  = '';
      document.getElementById('coupon-select').value = '';
      document.getElementById('discount-row').style.display = 'none';
      updateTotalDisplay();
    };

    window.submitOrder = async () => {
      const name  = document.getElementById('o-name').value.trim();
      const phone = document.getElementById('o-phone').value.trim();
      const addr  = document.getElementById('o-addr').value.trim();
      const memo  = document.getElementById('o-memo').value.trim();
      const msgEl = document.getElementById('order-msg');

      if (!name)  { msgEl.textContent = '받는 분 이름을 입력해 주세요.';  return; }
      if (!phone) { msgEl.textContent = '연락처를 입력해 주세요.';        return; }
      if (!addr)  { msgEl.textContent = '배송 주소를 입력해 주세요.';     return; }

      const btn = document.getElementById('btn-confirm');
      btn.disabled = true;
      msgEl.textContent = '처리 중...';

      try {
        // 재고 검증
        const stockSnap = await getDoc(doc(db, 'products', product.id));
        const currentStock = stockSnap.exists() ? (stockSnap.data().stock ?? 9999) : 0;
        if (currentStock < qty) {
          msgEl.textContent = `재고가 부족합니다. (남은 재고: ${currentStock}개)`;
          btn.disabled = false;
          return;
        }

        const effectivePrice = getEffectivePrice();
        const finalTotal     = calcTotal(effectivePrice);
        await addDoc(collection(db, 'orders'), {
          productId:   product.id,
          productName: product.name,
          category:    product.category,
          image:       product.image || '',
          price:       effectivePrice,
          option:      optionSummary(),
          qty,
          total:       finalTotal,
          discount:    effectivePrice * qty - finalTotal,
          couponCode:  appliedCoupon?.code || null,
          payMethod,
          recipient:   name,
          phone,
          address:     addr,
          memo,
          userId:      currentUser?.uid || null,
          userEmail:   currentUser?.email || null,
          status:      '주문 접수',
          createdAt:   serverTimestamp(),
        });

        // 재고 차감
        try {
          await updateDoc(doc(db, 'products', product.id), { stock: increment(-qty) });
        } catch {}

        // 사용한 쿠폰 보유 목록에서 제거
        if (appliedCoupon && currentUser) {
          try {
            const userRef  = doc(db, 'users', currentUser.uid);
            const userSnap = await getDoc(userRef);
            const remaining = (userSnap.data()?.collectedCoupons || [])
              .filter(c => c.code !== appliedCoupon.code);
            await updateDoc(userRef, { collectedCoupons: remaining });
          } catch {}
        }

        document.getElementById('order-form-wrap').style.display = 'none';
        document.getElementById('order-done').style.display      = 'block';
      } catch (err) {
        console.error(err);
        msgEl.textContent = '주문에 실패했습니다. 다시 시도해 주세요.';
      } finally {
        btn.disabled = false;
      }
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePayModal(); });

    /* ── 재입고 알림 ── */
    window.toggleRestockAlert = async () => {
      if (!currentUser) { showToast('로그인 후 이용 가능합니다.'); return; }
      const btn = document.getElementById('btn-restock');
      const ref = doc(db, 'restock_alerts', productId);
      try {
        const snap = await getDoc(ref);
        const subs = snap.exists() ? (snap.data().subscribers || []) : [];
        const isSubscribed = subs.includes(currentUser.uid);
        if (isSubscribed) {
          await updateDoc(ref, {
            subscribers: arrayRemove(currentUser.uid),
            [`requests.${currentUser.uid}`]: deleteField()
          });
          btn.textContent = '재입고 알림 신청';
          btn.classList.remove('subscribed');
          showToast('알림 신청이 취소됐습니다.');
        } else {
          const userDetail = { email: currentUser.email || '', name: currentUser.displayName || '', requestedAt: serverTimestamp() };
          if (snap.exists()) {
            await updateDoc(ref, {
              subscribers: arrayUnion(currentUser.uid),
              [`requests.${currentUser.uid}`]: userDetail
            });
          } else {
            await setDoc(ref, {
              subscribers: [currentUser.uid],
              productId,
              requests: { [currentUser.uid]: userDetail }
            });
          }
          btn.textContent = '알림 신청 취소';
          btn.classList.add('subscribed');
          showToast('재입고 시 알림을 보내드릴게요 ✦');
        }
      } catch { showToast('오류가 발생했습니다.'); }
    };

    /* ── 장바구니 ── */
    function getCart() {
      try { return JSON.parse(localStorage.getItem('cm_cart') || '[]'); } catch { return []; }
    }
    function saveCart(cart) {
      localStorage.setItem('cm_cart', JSON.stringify(cart));
      if (currentUser) {
        updateDoc(doc(db, 'users', currentUser.uid), { cart }).catch(() => {});
      }
    }

    function updateCartBadge() {
      const count = getCart().reduce((s, i) => s + i.qty, 0);
      const badge = document.getElementById('cart-badge');
      if (!badge) return;
      if (count > 0) { badge.textContent = count > 9 ? '9+' : count; badge.classList.add('show'); }
      else { badge.classList.remove('show'); }
    }

    window.addToCart = () => {
      if (!product) return;
      if (!checkOptionSelected()) return;
      const cart    = getCart();
      const optSum  = optionSummary();
      const effPrice = getEffectivePrice();
      // 같은 상품 + 같은 옵션이면 수량 합산
      const existing = cart.find(i => i.id === product.id && i.option === optSum);
      if (existing) { existing.qty += qty; }
      else {
        cart.push({
          id:       product.id,
          name:     product.name,
          material: product.material || '',
          price:    effPrice,
          image:    product.image || '',
          category: product.category || '',
          option:   optSum,
          qty,
        });
      }
      saveCart(cart);
      updateCartBadge();
      showCartConfirm(optSum, effPrice);
    };

    /* ── 장바구니 확인 패널 ── */
    let _ccTimer = null;
    const CC_DURATION = 5000; // 5초 후 자동 닫힘

    function showCartConfirm(optSum, effPrice) {
      const panel = document.getElementById('cart-confirm');

      // 이미지
      const imgEl = document.getElementById('cc-img');
      if (product.image) {
        imgEl.innerHTML = `<img src="${product.image}" alt="">`;
      } else {
        imgEl.textContent = '✦';
      }

      document.getElementById('cc-name').textContent = product.name || '';

      const parts = [];
      if (optSum) parts.push(optSum);
      parts.push(`수량 ${qty}개`);
      const price = effPrice ? effPrice.toLocaleString('ko-KR') + '원' : '';
      if (price) parts.push(price);
      document.getElementById('cc-sub').textContent = parts.join('  ·  ');

      // 프로그레스 바 리셋 후 카운트다운
      const bar = document.getElementById('cc-progress-bar');
      bar.style.transition = 'none';
      bar.style.width = '100%';
      panel.classList.add('show');

      clearTimeout(_ccTimer);
      // 다음 프레임에 transition 활성화
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          bar.style.transition = `width ${CC_DURATION}ms linear`;
          bar.style.width = '0%';
        });
      });
      _ccTimer = setTimeout(closeCartConfirm, CC_DURATION);
    }

    window.closeCartConfirm = () => {
      document.getElementById('cart-confirm').classList.remove('show');
      clearTimeout(_ccTimer);
    };

    /* ── 찜하기 ── */
    function updateLikeCount(n) {
      const el = document.getElementById('like-count');
      if (!el) return;
      el.textContent = n > 0 ? `· ${n}명` : '';
    }

    window.toggleLike = async () => {
      if (!currentUser) { showToast('로그인이 필요합니다'); return; }
      if (likeInProgress.has(productId)) return;
      likeInProgress.add(productId);
      const btn = document.getElementById('btn-like');
      const wasLiked = likedSet.has(productId);
      try {
        // ① 유저 찜 목록 업데이트 (필수)
        if (wasLiked) {
          likedSet.delete(productId);
          btn.classList.remove('liked');
          await updateDoc(doc(db, 'users', currentUser.uid), { likedProducts: arrayRemove(productId) });
        } else {
          likedSet.add(productId);
          btn.classList.add('liked');
          await updateDoc(doc(db, 'users', currentUser.uid), { likedProducts: arrayUnion(productId) });
        }
        // ② 상품 likeCount 업데이트 (별도 처리 — 실패해도 찜하기는 유지)
        try {
          await updateDoc(doc(db, 'products', productId), { likeCount: increment(wasLiked ? -1 : 1) });
          product.likeCount = Math.max(0, (product.likeCount || 0) + (wasLiked ? -1 : 1));
        } catch {}
        updateLikeCount(product.likeCount || 0);
      } catch {
        if (wasLiked) { likedSet.add(productId); btn.classList.add('liked'); }
        else          { likedSet.delete(productId); btn.classList.remove('liked'); }
        showToast('오류가 발생했습니다');
      } finally {
        likeInProgress.delete(productId);
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    // 페이지 로드 시 뱃지 초기화
    updateCartBadge();

    /* ── 리뷰 ── */
    let myRating = 0;
    let reviewPhotos = []; // { file, previewUrl }
    const _productId = productId;

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function starsHtml(r) {
      return '★'.repeat(Math.round(r)) + '☆'.repeat(5 - Math.round(r));
    }

    // 구매 여부 확인
    async function checkPurchased(userId) {
      try {
        // 단일 상품 주문
        const q1 = query(collection(db, 'orders'),
          where('userId', '==', userId), where('productId', '==', _productId));
        const s1 = await getDocs(q1);
        if (!s1.empty) return true;
        // 장바구니 주문 (items 배열)
        const q2 = query(collection(db, 'orders'), where('userId', '==', userId));
        const s2 = await getDocs(q2);
        return s2.docs.some(d => (d.data().items || []).some(i => i.id === _productId));
      } catch { return false; }
    }

    async function loadReviews() {
      if (!_productId) return;
      document.getElementById('reviews-section').style.display = '';
      try {
        const snap = await getDocs(query(
          collection(db, 'products', _productId, 'reviews'),
          orderBy('createdAt', 'desc')
        ));
        const reviews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const count = reviews.length;
        const avg = count ? reviews.reduce((s, r) => s + r.rating, 0) / count : 0;

        document.getElementById('review-count-label').textContent = `리뷰 ${count}개`;
        document.getElementById('avg-score').textContent = count ? avg.toFixed(1) : '-';
        document.getElementById('avg-stars').textContent = count ? starsHtml(avg) : '';

        const list = document.getElementById('review-list');
        if (count === 0) {
          list.innerHTML = '<p class="reviews-empty">아직 리뷰가 없습니다. 구매 후 첫 번째 리뷰를 남겨보세요!</p>';
        } else {
          const user = auth.currentUser;
          list.innerHTML = reviews.map(r => {
            const date = r.createdAt ? new Date(r.createdAt.seconds * 1000).toLocaleDateString('ko-KR') : '';
            const canDel = user && user.uid === r.userId;
            const photosHtml = (r.photoUrls || []).length
              ? `<div class="review-photos">${(r.photoUrls || []).map(u => `<img src="${u}" onclick="window.open('${u}','_blank')" alt="리뷰 사진">`).join('')}</div>`
              : '';
            return `<div class="review-item">
              <div class="review-meta">
                <p class="review-author">${esc(r.userName || '익명')}</p>
                <p class="review-stars">${starsHtml(r.rating)}</p>
                <p class="verified-badge">✔ 구매 인증</p>
                <p class="review-date">${date}</p>
              </div>
              <div class="review-body">
                <p class="review-comment">${esc(r.comment || '')}</p>
                ${photosHtml}
                ${canDel ? `<button class="btn-review-delete" onclick="deleteReview('${r.id}')">삭제</button>` : ''}
              </div>
            </div>`;
          }).join('');
        }
        await renderReviewForm(reviews);
      } catch (e) { console.error(e); }
    }

    async function renderReviewForm(reviews) {
      const area = document.getElementById('review-form-area');
      const user = auth.currentUser;
      if (!user) {
        area.innerHTML = `<p class="reviews-login-prompt"><a href="login.html">로그인</a> 후 구매하신 분만 리뷰를 작성할 수 있어요.</p>`;
        return;
      }
      const already = reviews.find(r => r.userId === user.uid);
      if (already) {
        area.innerHTML = `<p class="reviews-login-prompt" style="color:var(--antique-gold);">✦ 이미 리뷰를 작성하셨습니다.</p>`;
        return;
      }
      const purchased = await checkPurchased(user.uid);
      if (!purchased) {
        area.innerHTML = `<p class="reviews-login-prompt">구매하신 상품에만 리뷰를 작성할 수 있어요.</p>`;
        return;
      }
      area.innerHTML = `
        <div class="review-form-wrap">
          <p class="review-form-title">리뷰 작성 <span style="color:var(--antique-gold);font-size:10px;">✔ 구매 인증</span></p>
          <div class="star-input" id="star-input">
            ${[1,2,3,4,5].map(i => `<span data-v="${i}" onclick="setRating(${i})">☆</span>`).join('')}
          </div>
          <textarea class="review-textarea" id="review-text" placeholder="구매하신 상품은 어떠셨나요? 실물 사진, 착용감 등 솔직한 후기를 남겨주세요."></textarea>
          <div>
            <label class="review-photo-label" for="review-photo-input">📷 사진 첨부 (최대 3장)</label>
            <input type="file" id="review-photo-input" accept="image/*" multiple style="display:none;" onchange="previewPhotos(this)">
          </div>
          <div class="review-photo-preview" id="review-photo-preview"></div>
          <p class="review-msg" id="review-msg"></p>
          <button class="btn-review-submit" id="btn-review-submit" onclick="submitReview()">리뷰 등록</button>
        </div>`;
      myRating = 0; reviewPhotos = [];
    }

    window.setRating = (v) => {
      myRating = v;
      document.querySelectorAll('#star-input span').forEach(s => {
        s.textContent = parseInt(s.dataset.v) <= v ? '★' : '☆';
        s.classList.toggle('on', parseInt(s.dataset.v) <= v);
      });
    };

    window.previewPhotos = (input) => {
      const files = Array.from(input.files).slice(0, 3);
      reviewPhotos = files.map(f => ({ file: f, previewUrl: URL.createObjectURL(f) }));
      const wrap = document.getElementById('review-photo-preview');
      wrap.innerHTML = reviewPhotos.map((p, i) => `
        <div>
          <img src="${p.previewUrl}" style="width:72px;height:72px;object-fit:cover;border:1px solid var(--sand);">
          <button class="rm-photo" onclick="removePhoto(${i})">✕ 제거</button>
        </div>`).join('');
    };

    window.removePhoto = (i) => {
      reviewPhotos.splice(i, 1);
      const wrap = document.getElementById('review-photo-preview');
      wrap.innerHTML = reviewPhotos.map((p, idx) => `
        <div>
          <img src="${p.previewUrl}" style="width:72px;height:72px;object-fit:cover;border:1px solid var(--sand);">
          <button class="rm-photo" onclick="removePhoto(${idx})">✕ 제거</button>
        </div>`).join('');
    };

    window.submitReview = async () => {
      const user = auth.currentUser;
      if (!user) return;
      if (!myRating) { document.getElementById('review-msg').textContent = '별점을 선택해주세요.'; return; }
      const comment = document.getElementById('review-text').value.trim();
      if (!comment) { document.getElementById('review-msg').textContent = '리뷰 내용을 입력해주세요.'; return; }
      const btn = document.getElementById('btn-review-submit');
      btn.disabled = true;
      document.getElementById('review-msg').textContent = '등록 중...';
      try {
        // 사진 업로드 (Cloudinary)
        const photoUrls = [];
        for (const p of reviewPhotos) {
          const form = new FormData();
          form.append('file', p.file);
          form.append('upload_preset', '체크메이트_업로드');
          const res = await fetch('https://api.cloudinary.com/v1_1/dvholzgjx/image/upload', { method: 'POST', body: form });
          const data = await res.json();
          if (!data.secure_url) throw new Error('Cloudinary upload failed');
          photoUrls.push(data.secure_url);
        }
        const uSnap = await getDoc(doc(db, 'users', user.uid));
        const uData = uSnap.exists() ? uSnap.data() : {};
        const userName = uData.firstName || uData.name || user.displayName || '익명';
        await addDoc(collection(db, 'products', _productId, 'reviews'), {
          userId: user.uid, userName, rating: myRating, comment, photoUrls, createdAt: serverTimestamp()
        });
        // 평균 평점 업데이트
        const allSnap = await getDocs(collection(db, 'products', _productId, 'reviews'));
        const all = allSnap.docs.map(d => d.data().rating);
        const newAvg = all.reduce((s, v) => s + v, 0) / all.length;
        await updateDoc(doc(db, 'products', _productId), { avgRating: Math.round(newAvg * 10) / 10, reviewCount: all.length });
        showToast('리뷰가 등록됐어요 ✦');
        await loadReviews();
      } catch (e) { console.error(e); document.getElementById('review-msg').textContent = '오류가 발생했습니다.'; }
      finally { if (btn) btn.disabled = false; }
    };

    window.deleteReview = async (reviewId) => {
      if (!confirm('리뷰를 삭제할까요?')) return;
      try {
        await deleteDoc(doc(db, 'products', _productId, 'reviews', reviewId));
        const allSnap = await getDocs(collection(db, 'products', _productId, 'reviews'));
        const all = allSnap.docs.map(d => d.data().rating);
        const newAvg = all.length ? all.reduce((s, v) => s + v, 0) / all.length : 0;
        await updateDoc(doc(db, 'products', _productId), { avgRating: Math.round(newAvg * 10) / 10, reviewCount: all.length });
        showToast('리뷰가 삭제됐습니다.');
        await loadReviews();
      } catch { showToast('삭제에 실패했습니다.'); }
    };

    // 상품 로드 후 리뷰 로드
    setTimeout(loadReviews, 300);

    /* ── 검색 ── */
    let _allProducts = null;

    async function ensureSearchProducts() {
      if (_allProducts !== null) return;
      try {
        const snap = await getDocs(collection(db, 'products'));
        _allProducts = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .filter(p => !p.id.startsWith('_'));
      } catch { _allProducts = []; }
    }

    function showSearchResults(results) {
      const el = document.getElementById('search-results');
      if (results.length === 0) {
        el.innerHTML = `<p class="search-empty">검색 결과가 없습니다</p>`;
      } else {
        el.innerHTML = results.map(p => {
          const imgSrc = p.image || (p.images && p.images[0]);
          const imgHtml = imgSrc ? `<img src="${imgSrc}" alt="">` : (CAT_LABEL[p.category] || '✦');
          const price = p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '';
          const cat = CAT_LABEL[p.category] || '';
          const meta = [cat, p.material].filter(Boolean).join(' · ');
          return `<a class="search-result-item" href="product.html?id=${p.id}">
            <div class="sri-img">${imgHtml}</div>
            <div class="sri-info">
              <p class="sri-name">${p.name || '-'}</p>
              <p class="sri-meta">${meta}</p>
            </div>
            ${price ? `<span class="sri-price">${price}</span>` : ''}
          </a>`;
        }).join('');
      }
      el.classList.add('has-results');
    }

    function closeSearchResults() {
      const el = document.getElementById('search-results');
      if (el) { el.classList.remove('has-results'); el.innerHTML = ''; }
    }

    window.toggleSearch = () => {
      const wrap = document.getElementById('search-wrap');
      const isActive = wrap.classList.toggle('active');
      if (isActive) {
        setTimeout(() => document.getElementById('search-input').focus(), 50);
      } else {
        document.getElementById('search-input').value = '';
        closeSearchResults();
      }
    };

    document.getElementById('search-input').addEventListener('input', async function () {
      const q = this.value.trim().toLowerCase();
      if (!q) { closeSearchResults(); return; }
      await ensureSearchProducts();
      const results = (_allProducts || []).filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      ).slice(0, 6);
      showSearchResults(results);
    });

    document.getElementById('search-input').addEventListener('keydown', async function (e) {
      if (e.key !== 'Enter') return;
      const q = this.value.trim().toLowerCase();
      if (!q) return;
      await ensureSearchProducts();
      const first = (_allProducts || []).find(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      );
      if (first) location.href = `product.html?id=${first.id}`;
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-wrap')) closeSearchResults();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('search-wrap')?.classList.remove('active');
        const si = document.getElementById('search-input');
        if (si) si.value = '';
        closeSearchResults();
      }
    });
  </script>
</body>
</html>
