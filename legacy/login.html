<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="picture/cm.png">
  <title>CHECKMATE ⬦ 환영합니다</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/common.css">
  <style>
    body {
      background: var(--sand);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      border-bottom: 1px solid var(--gold);
      background: var(--cream);
    }
    .logo {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      color: var(--dark);
      text-decoration: none;
    }
    .nav-back {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.3s;
    }
    .nav-back:hover { color: var(--cherry); }
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .auth-container {
      width: 100%;
      max-width: 460px;
      animation: fadeUp 0.6s ease forwards;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--gold);
      margin-bottom: 48px;
    }
    .tab-btn {
      flex: 1;
      padding: 16px;
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: -1px;
    }
    .tab-btn.active { color: var(--cherry); border-bottom-color: var(--cherry); }
    .tab-btn:hover:not(.active) { color: var(--dark); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .auth-header { margin-bottom: 40px; }
    .auth-eyebrow {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--antique-gold);
      margin-bottom: 12px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      color: var(--dark);
    }
    .deco-line {
      width: 40px;
      height: 1px;
      background: var(--antique-gold);
      margin-bottom: 32px;
    }
    .form-group { margin-bottom: 24px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .form-row .form-group { flex: 1; margin-bottom: 0; }
    .form-label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .form-input {
      width: 100%;
      padding: 14px 0;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: var(--dark);
      background: none;
      border: none;
      border-bottom: 1px solid var(--gold);
      outline: none;
      transition: border-color 0.3s;
    }
    .form-input::placeholder { color: var(--gold); }
    .form-input:focus { border-bottom-color: var(--cherry); }
    .form-check {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      cursor: pointer;
    }
    .form-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--cherry);
      cursor: pointer;
    }
    .form-check span { font-size: 12px; color: var(--muted); letter-spacing: 1px; }
    .btn-primary {
      width: 100%;
      padding: 18px;
      background: var(--cherry);
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
      margin-bottom: 24px;
    }
    .btn-primary:hover { background: var(--dark); }
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
    }
    .divider span { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .btn-social {
      width: 100%;
      padding: 14px;
      background: var(--cream);
      color: var(--dark);
      font-family: var(--font-body);
      font-size: 12px;
      letter-spacing: 2px;
      border: 1px solid var(--gold);
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn-social:hover { border-color: var(--cherry); color: var(--cherry); }
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--muted);
      text-decoration: none;
      margin-top: -12px;
      margin-bottom: 32px;
      transition: color 0.3s;
    }
    .forgot-link:hover { color: var(--cherry); }
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-bottom: 16px;
      letter-spacing: 1px;
      display: none;
    }
    .success-msg {
      font-size: 12px;
      color: #27ae60;
      margin-bottom: 16px;
      letter-spacing: 1px;
      display: none;
    }
    footer {
      background: var(--dark);
      color: var(--sand);
      padding: 28px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 6px;
      color: var(--sand);
      text-decoration: none;
    }
    .footer-text { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
    .pw-wrapper { position: relative; }
    .pw-wrapper .form-input { padding-right: 36px; }
    .btn-pw-toggle {
      position: absolute;
      right: 0;
      bottom: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--gold);
      transition: color 0.3s;
      line-height: 1;
    }
    .btn-pw-toggle:hover { color: var(--cherry); }
    .btn-pw-toggle svg { display: block; width: 18px; height: 18px; }

    /* ── 반응형 (모바일) ── */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .logo { font-size: 22px; letter-spacing: 4px; }
      .auth-wrapper { padding: 32px 20px; }
      .auth-title { font-size: 32px; }
      .form-row { flex-direction: column; gap: 0; }
      .form-row .form-group { margin-bottom: 24px; }
      footer { padding: 20px; flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="checkmate.html">CHECKMATE</a>
    <a class="nav-back" href="checkmate.html">← 메인으로</a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-container">

      <div class="auth-tabs">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 패널 -->
      <div class="auth-panel active" id="panel-login">
        <div class="auth-header">
          <p class="auth-eyebrow">Login</p>
        </div>
        <div class="deco-line"></div>
        <div id="login-error" class="error-msg"></div>

        <div class="form-group">
          <label class="form-label">아이디</label>
          <input class="form-input" type="text" id="login-email" placeholder="아이디를 입력하세요">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrapper">
            <input class="form-input" type="password" id="login-password" placeholder="••••••••">
            <button type="button" class="btn-pw-toggle" onclick="togglePw('login-password', this)" aria-label="비밀번호 표시/숨기기">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-primary" id="btn-login-submit" onclick="loginWithEmail()">Login</button>

        <div class="divider"><span>또는</span></div>
        <button class="btn-social" onclick="loginWithGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google로 Login
        </button>
      </div>

      <!-- 회원가입 패널 -->
      <div class="auth-panel" id="panel-signup">
        <div class="auth-header">
          <p class="auth-eyebrow">Join us</p>
        </div>
        <div class="deco-line"></div>
        <div id="signup-error" class="error-msg"></div>
        <div id="signup-success" class="success-msg"></div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">성</label>
            <input class="form-input" type="text" id="signup-lastname" placeholder="홍">
          </div>
          <div class="form-group">
            <label class="form-label">이름</label>
            <input class="form-input" type="text" id="signup-firstname" placeholder="길동">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">아이디</label>
          <input class="form-input" type="text" id="signup-email" placeholder="아이디를 입력하세요" onblur="checkIdDuplicate()">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrapper">
            <input class="form-input" type="password" id="signup-password" placeholder="8자 이상 입력하세요">
            <button type="button" class="btn-pw-toggle" onclick="togglePw('signup-password', this)" aria-label="비밀번호 표시/숨기기">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password 확인</label>
          <div class="pw-wrapper">
            <input class="form-input" type="password" id="signup-password2" placeholder="••••••••">
            <button type="button" class="btn-pw-toggle" onclick="togglePw('signup-password2', this)" aria-label="비밀번호 표시/숨기기">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">성별</label>
          <select class="form-input" id="signup-gender" style="appearance:auto;-webkit-appearance:auto;cursor:pointer;background:transparent;">
            <option value="">선택하세요</option>
            <option value="male">남성</option>
            <option value="female">여성</option>
            <option value="other">선택 안 함</option>
          </select>
        </div>

        <label class="form-check">
          <input type="checkbox" id="signup-agree">
          <span><a href="#" style="color:var(--cherry);">이용약관</a> 및 <a href="#" style="color:var(--cherry);">개인정보처리방침</a>에 동의합니다</span>
        </label>

        <button class="btn-primary" id="btn-signup-submit" onclick="signUp()">회원가입</button>

        <div class="divider"><span>또는</span></div>
        <button class="btn-social" onclick="loginWithGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google로 가입하기
        </button>
      </div>

    </div>
  </div>

  <footer>
    <a class="footer-logo" href="checkmate.html">CHECKMATE</a>
    <p class="footer-text">© 2025 CHECKMATE Jewelry. All rights reserved.</p>
  </footer>

  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile, onAuthStateChanged, signOut, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // 아이디 → Firebase용 이메일 변환 (@가 없으면 도메인 추가, 있으면 그대로)
    function toEmail(id) {
      return id.includes('@') ? id : id.toLowerCase() + '@checkmate.app';
    }

    function isValidId(id) {
      return id.length >= 2 && !id.includes(' ');
    }

    const errMsgs = {
      'auth/user-not-found': '등록되지 않은 아이디입니다.',
      'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
      'auth/invalid-email': '아이디 형식이 올바르지 않습니다.',
      'auth/invalid-credential': '아이디 또는 비밀번호를 확인해주세요.',
      'auth/email-already-in-use': '이미 사용 중인 아이디입니다.',
      'auth/weak-password': '비밀번호가 너무 약합니다.',
    };

    function showMsg(id, msg, isError = true) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.color = isError ? '#c0392b' : '#27ae60';
      el.style.display = 'block';
    }

    function hideAll() {
      ['login-error', 'signup-error', 'signup-success'].forEach(id => {
        document.getElementById(id).style.display = 'none';
      });
    }

    window.switchTab = (tab) => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
      hideAll();
    };

    function activeErrorId() {
      return document.getElementById('panel-login').classList.contains('active')
        ? 'login-error' : 'signup-error';
    }

    async function checkBanned(user) {
      try {
        const snap = await getDoc(doc(db, 'banned_users', user.uid));
        if (snap.exists()) {
          await signOut(auth);
          showMsg(activeErrorId(), '접근이 제한된 계정입니다.');
          return true;
        }
      } catch {
        // 컬렉션 없거나 권한 없는 경우 → 차단 안 된 것으로 처리
      }
      return false;
    }

    window.loginWithEmail = async () => {
      hideAll();
      const id = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!id || !password) return showMsg('login-error', '아이디와 비밀번호를 입력해주세요.');
      const btn = document.getElementById('btn-login-submit');
      btn.disabled = true; btn.textContent = '처리 중...';
      try {
        const { user } = await signInWithEmailAndPassword(auth, toEmail(id), password);
        if (await checkBanned(user)) { btn.disabled = false; btn.textContent = 'Login'; return; }
        window.location.href = 'checkmate.html';
      } catch (e) {
        showMsg('login-error', errMsgs[e.code] || '로그인에 실패했습니다.');
        btn.disabled = false; btn.textContent = 'Login';
      }
    };

    window.signUp = async () => {
      hideAll();
      window.checkIdDuplicate = async () => {
        const id = document.getElementById('signup-email').value.trim();
        const errEl = document.getElementById('signup-error');
        if (!id || !isValidId(id)) return;
        try {
          const methods = await fetchSignInMethodsForEmail(auth, toEmail(id));
          if (methods.length > 0) {
            showMsg('signup-error', '이미 사용 중인 아이디입니다.');
          } else {
            errEl.style.display = 'none';
          }
        } catch {}
      };

      const lastName  = document.getElementById('signup-lastname').value.trim();
      const firstName = document.getElementById('signup-firstname').value.trim();
      const id = document.getElementById('signup-email').value.trim();
      const pw = document.getElementById('signup-password').value;
      const pw2 = document.getElementById('signup-password2').value;
      const gender = document.getElementById('signup-gender').value;
      const agree = document.getElementById('signup-agree').checked;

      if (!lastName)  return showMsg('signup-error', '성을 입력해주세요.');
      if (!firstName) return showMsg('signup-error', '이름을 입력해주세요.');
      if (!gender)    return showMsg('signup-error', '성별을 선택해주세요.');
      if (!id) return showMsg('signup-error', '아이디를 입력해주세요.');
      if (!isValidId(id)) return showMsg('signup-error', '아이디에 @나 공백은 사용할 수 없습니다.');
      if (pw.length < 8) return showMsg('signup-error', '비밀번호는 8자 이상이어야 합니다.');
      if (pw !== pw2) return showMsg('signup-error', '비밀번호가 일치하지 않습니다.');
      if (!agree) return showMsg('signup-error', '이용약관에 동의해주세요.');

      const btn = document.getElementById('btn-signup-submit');
      btn.disabled = true; btn.textContent = '처리 중...';
      try {
        const result = await createUserWithEmailAndPassword(auth, toEmail(id), pw);
        await updateProfile(result.user, { displayName: firstName });
        await setDoc(doc(db, 'users', result.user.uid), {
          lastName, firstName, name: lastName + firstName, username: id,
          gender, role: 'user', createdAt: serverTimestamp()
        });
        showMsg('signup-success', '회원가입 완료! 로그인 해주세요.', false);
        setTimeout(() => window.switchTab('login'), 1500);
      } catch (e) {
        showMsg('signup-error', errMsgs[e.code] || '회원가입에 실패했습니다.');
        btn.disabled = false; btn.textContent = '회원가입';
      }
    };

    window.loginWithGoogle = async () => {
      hideAll();
      try {
        const result = await signInWithPopup(auth, googleProvider);
        if (await checkBanned(result.user)) return;
        await setDoc(doc(db, 'users', result.user.uid), {
          name: result.user.displayName,
          email: result.user.email,
          role: 'user',
          createdAt: serverTimestamp()
        }, { merge: true });
        window.location.href = 'checkmate.html';
      } catch (e) {
        showMsg(activeErrorId(), 'Google 로그인에 실패했습니다.');
      }
    };

    const SVG_EYE     = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const SVG_EYE_OFF = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

    window.togglePw = (id, btn) => {
      const input = document.getElementById(id);
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden ? SVG_EYE : SVG_EYE_OFF;
    };

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const loginActive = document.getElementById('panel-login').classList.contains('active');
      if (loginActive) {
        window.loginWithEmail();
      } else {
        window.signUp();
      }
    });

  </script>

</body>
</html>
