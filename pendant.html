<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="picture/cm.png">
  <title>pendant</title>
  <meta name="description" content="체크메이트 펜던트 컬렉션. 로즈골드, 골드, 실버 펜던트 목걸이를 만나보세요.">
  <meta name="keywords" content="펜던트, 목걸이, 골드 목걸이, 실버 목걸이, 로즈골드, 주얼리">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/common.css">
  <link rel="stylesheet" href="style/collection.css">
</head>
<body>

  <nav>
    <a class="logo" href="checkmate.html">CHECKMATE</a>
    <ul class="nav-links">
      <li><a href="pendant.html" class="active">pendant</a></li>
      <li><a href="ring.html">ring</a></li>
      <li><a href="earring.html">earring</a></li>
      <li><a href="bracelet.html">bracelet</a></li>
    </ul>
    <div class="nav-right">
      <div class="search-wrap" id="search-wrap">
        <input class="search-input-inline" type="text" id="search-input" placeholder="검색어 입력..." autocomplete="off">
        <button class="btn-search" onclick="toggleSearch()" aria-label="검색">
          <span class="icon-search">
            <img src="picture/KakaoTalk_20260519_112412556.png" width="22" height="22" alt="검색" style="display:block;">
          </span>
        </button>
        <div class="search-results" id="search-results"></div>
      </div>
      <div id="nav-user-area">
        <a href="login.html" class="nav-icon-link">
          <img src="picture/KakaoTalk_20260519_112050420.png" width="22" height="22" alt="사용자" style="display:block;">
        </a>
      </div>
      <a href="cart.html" class="nav-icon-link cart-icon-wrap">
        <img src="picture/KakaoTalk_20260519_112053927.png" width="22" height="22" alt="장바구니" style="display:block;">
        <span class="cart-badge" id="cart-badge"></span>
      </a>
    </div>
  </nav>

  <div class="page-header">
    <div class="header-left">
      <p class="header-eyebrow">Collection</p>
      <h1 class="header-title">Pendant</h1>
      <p class="header-desc">체크메이트 펜던트 컬렉션. 로즈골드, 골드, 실버 펜던트 목걸이를 만나보세요.</p>
    </div>
    <div class="header-right">
      <p class="result-count" id="result-count">0 items</p>
      <select class="sort-select" id="sort-select" onchange="applySort()">
        <option value="newest">최신순</option>
        <option value="price-asc">가격 낮은순</option>
        <option value="price-desc">가격 높은순</option>
        <option value="popular">인기순</option>
      </select>
    </div>
  </div>

  <!-- 성별 필터 -->

  <div class="product-section">
    <div class="product-grid" id="product-grid">
      <div class="empty-state"><p class="empty-text">불러오는 중...</p></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    <a class="footer-logo" href="checkmate.html">CHECKMATE</a>
    <p class="footer-text">© Pendant Collection</p>
  </footer>

  <script type="module">
    const CAT = 'pendant';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs,
      query, where, updateDoc, arrayUnion, arrayRemove }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let products = [];
    let likedSet = new Set();
    let likeInProgress = new Set();
    let productsLoaded = false;

    // 로그인 확인을 기다리지 않고 바로 상품 목록을 불러옴 (SEO/초기 렌더링 속도 개선)
    loadProducts();

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        let name = user.displayName || user.email;
        try {
          const uSnap = await getDoc(doc(db, 'users', user.uid));
          const d = uSnap.data() || {};
          name = d.firstName || d.name || name;
          likedSet = new Set(d.likedProducts || []);
        } catch {}
        document.getElementById('nav-user-area').innerHTML = `
          <a class="nav-user-logged" href="mypage.html">
            <span class="nav-user-name">${name}&thinsp;님</span>
          </a>`;
      } else {
        likedSet = new Set();
      }
      if (productsLoaded) renderGrid();
    });


    async function loadProducts() {
      try {
        const q = query(
          collection(db, 'products'),
          where('category', '==', CAT)
        );
        const snap = await getDocs(q);
        products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch (e) {
        console.error(e);
        products = [];
        document.getElementById('product-grid').innerHTML = `
          <div class="empty-state">
            <p class="empty-symbol">⚠</p>
            <p class="empty-text">상품을 불러오지 못했습니다 — 잠시 후 다시 시도해 주세요</p>
          </div>`;
        document.getElementById('result-count').textContent = '0 items';
        return;
      }
      productsLoaded = true;
      renderGrid();
    }

    window.applySort = () => renderGrid();

    function getSorted(list) {
      const v = document.getElementById('sort-select').value;
      const arr = [...list];
      if (v === 'price-asc')  return arr.sort((a, b) => (a.price || 0) - (b.price || 0));
      if (v === 'price-desc') return arr.sort((a, b) => (b.price || 0) - (a.price || 0));
      if (v === 'name')       return arr.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      if (v === 'popular')    return arr.sort((a, b) => (b.likeCount || 0) - (a.likeCount || 0));
      // newest — createdAt 기준 내림차순
      return arr.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
    }

    function renderGrid() {
      const filtered = products;
      const sorted = getSorted(filtered);
      const grid = document.getElementById('product-grid');
      document.getElementById('result-count').textContent = `${sorted.length} items`;

      if (sorted.length === 0) {
        grid.innerHTML = `<div class="empty-state">
          <p class="empty-symbol">✦</p>
          <p class="empty-text">등록된 상품이 없습니다</p>
        </div>`;
        return;
      }

      grid.innerHTML = sorted.map(p => {
        const allOptsSO = (p.options||[]).length > 0 && (p.options||[]).every(g=>(g.values||[]).length > 0 && (g.values||[]).every(v=>v.stock===0));
        const isSO = p.soldOut || p.stock === 0 || allOptsSO;
        const isLowStock = !isSO && p.stock != null && p.stock > 0 && p.stock <= 5;
        const isLiked = likedSet.has(p.id);
        return `
        <div class="product-card${isSO ? ' is-soldout' : ''}"
          onclick="location.href='product.html?id=${p.id}'"
          style="cursor:pointer;">
          <div class="product-img-wrap">
            ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy">` : `<span class="product-placeholder">pendant</span>`}
            ${isSO ? `<div class="soldout-overlay"><span class="soldout-label">Sold Out</span></div>` : ''}
            ${isLowStock ? `<div class="low-stock-badge">잔여 ${p.stock}개</div>` : ''}
            <button class="like-btn${isLiked ? ' liked' : ''}" onclick="event.stopPropagation();toggleLike('${p.id}',this)" title="좋아요">
              <svg width="15" height="15" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="${isLiked ? '#C0392B' : 'none'}" stroke="${isLiked ? '#C0392B' : '#777'}"/>
              </svg>
            </button>
          </div>
          <div class="product-info">
            <p class="product-name">${p.name || '-'}</p>
            <p class="product-price">${p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '-'}</p>
          </div>
        </div>`;
      }).join('');
    }
    window.toggleLike = async (productId, btn) => {
      const user = auth.currentUser;
      if (!user) { showToast('로그인이 필요합니다'); return; }
      if (likeInProgress.has(productId)) return;
      likeInProgress.add(productId);
      const wasLiked = likedSet.has(productId);
      const path = btn.querySelector('path');
      try {
        if (wasLiked) {
          likedSet.delete(productId);
          btn.classList.remove('liked');
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#777');
          await updateDoc(doc(db, 'users', user.uid), { likedProducts: arrayRemove(productId) });
        } else {
          likedSet.add(productId);
          btn.classList.add('liked');
          path.setAttribute('fill', '#C0392B');
          path.setAttribute('stroke', '#C0392B');
          await updateDoc(doc(db, 'users', user.uid), { likedProducts: arrayUnion(productId) });
        }
      } catch {
        if (wasLiked) {
          likedSet.add(productId);
          btn.classList.add('liked');
          path.setAttribute('fill', '#C0392B');
          path.setAttribute('stroke', '#C0392B');
        } else {
          likedSet.delete(productId);
          btn.classList.remove('liked');
          path.setAttribute('fill', 'none');
          path.setAttribute('stroke', '#777');
        }
        showToast('오류가 발생했습니다');
      } finally {
        likeInProgress.delete(productId);
      }
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    /* ── 검색 ── */
    const _CAT_LABEL = { pendant:'Pendant', ring:'Ring', earring:'Earring', bracelet:'Bracelet' };
    let _allProducts = null;

    async function ensureSearchProducts() {
      if (_allProducts !== null) return;
      try {
        const snap = await getDocs(collection(db, 'products'));
        _allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => !p.id.startsWith('_'));
      } catch { _allProducts = []; }
    }

    function showSearchResults(results) {
      const el = document.getElementById('search-results');
      if (results.length === 0) {
        el.innerHTML = `<p class="search-empty">검색 결과가 없습니다</p>`;
      } else {
        el.innerHTML = results.map(p => {
          const imgSrc = p.image || (p.images && p.images[0]);
          const imgHtml = imgSrc ? `<img src="${imgSrc}" alt="">` : (_CAT_LABEL[p.category] || '✦');
          const price = p.price ? Number(p.price).toLocaleString('ko-KR') + '원' : '';
          const meta = [_CAT_LABEL[p.category] || '', p.material].filter(Boolean).join(' · ');
          return `<a class="search-result-item" href="product.html?id=${p.id}">
            <div class="sri-img">${imgHtml}</div>
            <div class="sri-info">
              <p class="sri-name">${p.name || '-'}</p>
              <p class="sri-meta">${meta}</p>
            </div>
            ${price ? `<span class="sri-price">${price}</span>` : ''}
          </a>`;
        }).join('');
      }
      el.classList.add('has-results');
    }

    function closeSearchResults() {
      const el = document.getElementById('search-results');
      if (el) { el.classList.remove('has-results'); el.innerHTML = ''; }
    }

    window.toggleSearch = () => {
      const wrap = document.getElementById('search-wrap');
      const isActive = wrap.classList.toggle('active');
      if (isActive) {
        setTimeout(() => document.getElementById('search-input').focus(), 50);
      } else {
        document.getElementById('search-input').value = '';
        closeSearchResults();
      }
    };

    document.getElementById('search-input').addEventListener('input', async function () {
      const q = this.value.trim().toLowerCase();
      if (!q) { closeSearchResults(); return; }
      await ensureSearchProducts();
      showSearchResults((_allProducts || []).filter(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      ).slice(0, 6));
    });

    document.getElementById('search-input').addEventListener('keydown', async function (e) {
      if (e.key !== 'Enter') return;
      const q = this.value.trim().toLowerCase();
      if (!q) return;
      await ensureSearchProducts();
      const first = (_allProducts || []).find(p =>
        (p.name || '').toLowerCase().includes(q) ||
        (p.material || '').toLowerCase().includes(q) ||
        (p.category || '').toLowerCase().includes(q)
      );
      if (first) location.href = `product.html?id=${first.id}`;
    });

    document.addEventListener('click', e => { if (!e.target.closest('#search-wrap')) closeSearchResults(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('search-wrap')?.classList.remove('active');
        const si = document.getElementById('search-input');
        if (si) si.value = '';
        closeSearchResults();
      }
    });
  </script>
  <script src="js/cart-badge.js"></script>
</body>
</html>
